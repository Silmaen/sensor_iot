<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace" font-size="12">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a2e; }
        .text { fill: #e0e0e0; }
        .text-dim { fill: #999; }
        .wire { stroke: #ccc; }
        .wire-pwr { stroke: #ff6b6b; }
        .wire-gnd { stroke: #74b9ff; }
        .wire-sig { stroke: #a29bfe; }
        .wire-sda { stroke: #fdcb6e; }
        .wire-scl { stroke: #55efc4; }
        .comp-outline { stroke: #ccc; fill: none; }
        .comp-fill { fill: #2a2a3e; }
        .net-label { fill: #e0e0e0; }
        .legend-bg { fill: #2a2a3e; stroke: #555; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .text { fill: #333; }
        .text-dim { fill: #777; }
        .wire { stroke: #333; }
        .wire-pwr { stroke: #c0392b; }
        .wire-gnd { stroke: #2c3e50; }
        .wire-sig { stroke: #2980b9; }
        .wire-sda { stroke: #e17055; }
        .wire-scl { stroke: #00b894; }
        .comp-outline { stroke: #333; fill: none; }
        .comp-fill { fill: #f8f8f8; }
        .net-label { fill: #333; }
        .legend-bg { fill: #f8f8f8; stroke: #ccc; }
      }
    </style>
    <!-- GND symbol -->
    <g id="gnd-sym">
      <line x1="0" y1="0" x2="0" y2="8" class="wire" stroke-width="1.5"/>
      <line x1="-8" y1="8" x2="8" y2="8" class="wire" stroke-width="1.5"/>
      <line x1="-5" y1="12" x2="5" y2="12" class="wire" stroke-width="1.5"/>
      <line x1="-2" y1="16" x2="2" y2="16" class="wire" stroke-width="1.5"/>
    </g>
    <!-- VDD symbol (arrow up) -->
    <g id="vdd-sym">
      <line x1="0" y1="0" x2="0" y2="-12" class="wire-pwr" stroke-width="1.5"/>
      <polygon points="-5,0 5,0 0,-6" class="wire-pwr" fill="currentColor" stroke="none"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" class="text">BME280 I2C Schematic</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" class="text-dim">Address 0x76 (SDO=GND) — I2C mode (CSB=VDD)</text>

  <!-- ==================== MCU BLOCK ==================== -->
  <rect x="50" y="120" width="160" height="200" rx="4" class="comp-outline comp-fill" stroke-width="2"/>
  <text x="130" y="145" text-anchor="middle" font-size="13" font-weight="bold" class="text">MCU</text>
  <text x="130" y="162" text-anchor="middle" font-size="9" class="text-dim">ESP8266 /</text>
  <text x="130" y="174" text-anchor="middle" font-size="9" class="text-dim">SAMD21</text>

  <!-- MCU pins (right side) -->
  <!-- SCL -->
  <line x1="210" y1="220" x2="240" y2="220" class="wire-scl" stroke-width="1.5"/>
  <circle cx="210" cy="220" r="3" class="wire-scl" fill="none" stroke-width="1.5"/>
  <text x="195" y="224" text-anchor="end" font-size="10" class="text">SCL</text>
  <text x="195" y="212" text-anchor="end" font-size="8" class="text-dim">D1/GPIO5</text>

  <!-- SDA -->
  <line x1="210" y1="260" x2="240" y2="260" class="wire-sda" stroke-width="1.5"/>
  <circle cx="210" cy="260" r="3" class="wire-sda" fill="none" stroke-width="1.5"/>
  <text x="195" y="264" text-anchor="end" font-size="10" class="text">SDA</text>
  <text x="195" y="252" text-anchor="end" font-size="8" class="text-dim">D2/GPIO4</text>

  <!-- MCU VDD pin -->
  <line x1="130" y1="120" x2="130" y2="95" class="wire-pwr" stroke-width="1.5"/>
  <text x="130" y="88" text-anchor="middle" font-size="10" font-weight="bold" class="wire-pwr" fill="currentColor">3.3V</text>

  <!-- MCU GND pin -->
  <line x1="130" y1="320" x2="130" y2="340" class="wire" stroke-width="1.5"/>
  <use href="#gnd-sym" x="130" y="340"/>

  <!-- ==================== PULL-UP RESISTORS ==================== -->
  <!-- R1: SCL pull-up -->
  <line x1="300" y1="220" x2="300" y2="180" class="wire-scl" stroke-width="1.5"/>
  <!-- Resistor body -->
  <rect x="292" y="140" width="16" height="40" rx="2" class="comp-outline" stroke-width="1.5"/>
  <text x="290" y="165" text-anchor="end" font-size="9" class="text">R1</text>
  <text x="320" y="165" font-size="9" class="text-dim">10k</text>
  <line x1="300" y1="140" x2="300" y2="105" class="wire-pwr" stroke-width="1.5"/>
  <!-- VDD connection -->
  <text x="300" y="98" text-anchor="middle" font-size="10" font-weight="bold" class="wire-pwr" fill="currentColor">3.3V</text>

  <!-- R2: SDA pull-up -->
  <line x1="360" y1="260" x2="360" y2="180" class="wire-sda" stroke-width="1.5"/>
  <!-- Resistor body -->
  <rect x="352" y="140" width="16" height="40" rx="2" class="comp-outline" stroke-width="1.5"/>
  <text x="350" y="165" text-anchor="end" font-size="9" class="text">R2</text>
  <text x="380" y="165" font-size="9" class="text-dim">10k</text>
  <line x1="360" y1="140" x2="360" y2="105" class="wire-pwr" stroke-width="1.5"/>
  <!-- VDD connection -->
  <text x="360" y="98" text-anchor="middle" font-size="10" font-weight="bold" class="wire-pwr" fill="currentColor">3.3V</text>

  <!-- SCL horizontal wire through pull-up junction -->
  <line x1="240" y1="220" x2="540" y2="220" class="wire-scl" stroke-width="1.5"/>
  <circle cx="300" cy="220" r="3" fill="currentColor" class="wire-scl"/>

  <!-- SDA horizontal wire through pull-up junction -->
  <line x1="240" y1="260" x2="540" y2="260" class="wire-sda" stroke-width="1.5"/>
  <circle cx="360" cy="260" r="3" fill="currentColor" class="wire-sda"/>

  <!-- ==================== BME280 IC ==================== -->
  <rect x="540" y="130" width="180" height="250" rx="4" class="comp-outline comp-fill" stroke-width="2"/>
  <text x="630" y="158" text-anchor="middle" font-size="13" font-weight="bold" class="text">BME280</text>
  <text x="630" y="173" text-anchor="middle" font-size="9" class="text-dim">Bosch</text>
  <!-- Pin 1 dot -->
  <circle cx="555" cy="148" r="3" class="text-dim" fill="currentColor"/>

  <!-- BME280 pins (left side) -->
  <!-- SCK/SCL pin -->
  <circle cx="540" cy="220" r="3" class="wire-scl" fill="none" stroke-width="1.5"/>
  <text x="555" y="224" font-size="10" class="text">SCK</text>
  <text x="555" y="212" font-size="8" class="text-dim">pin 2</text>

  <!-- SDI/SDA pin -->
  <circle cx="540" cy="260" r="3" class="wire-sda" fill="none" stroke-width="1.5"/>
  <text x="555" y="264" font-size="10" class="text">SDI</text>
  <text x="555" y="252" font-size="8" class="text-dim">pin 3</text>

  <!-- VDD pin (top) -->
  <text x="570" y="198" font-size="10" class="text">VDD</text>
  <text x="555" y="192" font-size="8" class="text-dim">pin 5</text>
  <line x1="540" y1="195" x2="490" y2="195" class="wire-pwr" stroke-width="1.5"/>
  <line x1="490" y1="195" x2="490" y2="105" class="wire-pwr" stroke-width="1.5"/>
  <circle cx="540" cy="195" r="3" class="wire-pwr" fill="none" stroke-width="1.5"/>
  <text x="490" y="98" text-anchor="middle" font-size="10" font-weight="bold" class="wire-pwr" fill="currentColor">3.3V</text>

  <!-- GND pin -->
  <text x="555" y="308" font-size="10" class="text">GND</text>
  <text x="555" y="298" font-size="8" class="text-dim">pin 1</text>
  <line x1="540" y1="305" x2="520" y2="305" class="wire" stroke-width="1.5"/>
  <line x1="520" y1="305" x2="520" y2="340" class="wire" stroke-width="1.5"/>
  <use href="#gnd-sym" x="520" y="340"/>
  <circle cx="540" cy="305" r="3" class="wire" fill="none" stroke-width="1.5"/>

  <!-- SDO pin (right side) — tied to GND for 0x76 -->
  <text x="680" y="224" font-size="10" class="text">SDO</text>
  <text x="680" y="212" font-size="8" class="text-dim">pin 4</text>
  <line x1="720" y1="220" x2="750" y2="220" class="wire" stroke-width="1.5"/>
  <line x1="750" y1="220" x2="750" y2="250" class="wire" stroke-width="1.5"/>
  <use href="#gnd-sym" x="750" y="250"/>
  <circle cx="720" cy="220" r="3" class="wire" fill="none" stroke-width="1.5"/>
  <text x="740" y="222" font-size="9" class="text-dim">= 0x76</text>

  <!-- CSB pin (right side) — tied to VDD for I2C -->
  <text x="680" y="264" font-size="10" class="text">CSB</text>
  <text x="680" y="252" font-size="8" class="text-dim">pin 6</text>
  <line x1="720" y1="260" x2="750" y2="260" class="wire-pwr" stroke-width="1.5"/>
  <line x1="750" y1="260" x2="750" y2="290" class="wire-pwr" stroke-width="1.5"/>
  <line x1="750" y1="290" x2="750" y2="285" class="wire-pwr" stroke-width="1.5"/>
  <text x="750" y="303" text-anchor="middle" font-size="10" font-weight="bold" class="wire-pwr" fill="currentColor">3.3V</text>
  <circle cx="720" cy="260" r="3" class="wire-pwr" fill="none" stroke-width="1.5"/>
  <text x="740" y="262" font-size="9" class="text-dim">I2C mode</text>

  <!-- ==================== DECOUPLING CAPACITOR ==================== -->
  <!-- C1: 100nF on VDD -->
  <line x1="460" y1="195" x2="460" y2="195" class="wire-pwr" stroke-width="1.5"/>
  <!-- Tap from VDD line -->
  <line x1="490" y1="195" x2="460" y2="195" class="wire-pwr" stroke-width="1.5"/>
  <line x1="460" y1="195" x2="460" y2="220" class="wire-pwr" stroke-width="1.5"/>
  <!-- Cap plates -->
  <line x1="448" y1="220" x2="472" y2="220" class="comp-outline" stroke-width="2"/>
  <line x1="448" y1="228" x2="472" y2="228" class="comp-outline" stroke-width="2"/>
  <!-- GND side -->
  <line x1="460" y1="228" x2="460" y2="248" class="wire" stroke-width="1.5"/>
  <use href="#gnd-sym" x="460" y="248"/>
  <text x="440" y="238" text-anchor="end" font-size="9" class="text">C1</text>
  <text x="440" y="250" text-anchor="end" font-size="9" class="text-dim">100nF</text>
  <!-- Junction dot on VDD rail -->
  <circle cx="490" cy="195" r="3" fill="currentColor" class="wire-pwr"/>

  <!-- ==================== LEGEND ==================== -->
  <rect x="40" y="400" width="720" height="85" rx="6" class="legend-bg" stroke-width="1"/>
  <text x="400" y="420" text-anchor="middle" font-size="11" font-weight="bold" class="text">Component Summary</text>

  <text x="70" y="442" font-size="10" class="text">R1, R2 : 10k pull-up (SDA, SCL)</text>
  <text x="70" y="458" font-size="10" class="text">C1     : 100nF ceramic decoupling</text>
  <text x="70" y="474" font-size="10" class="text">SDO=GND: addr 0x76 (default)</text>

  <text x="400" y="442" font-size="10" class="text">CSB=VDD  : I2C mode enabled</text>
  <text x="400" y="458" font-size="10" class="text">Chip ID  : 0x60 (BME280) / 0x58 (BMP280)</text>
  <text x="400" y="474" font-size="10" class="text-dim">Note: Breakout boards typically include R1, R2, C1</text>
</svg>
