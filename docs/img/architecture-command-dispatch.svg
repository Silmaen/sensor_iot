<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="600" height="400" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="300" y="25" text-anchor="middle">MQTT Command Dispatch Flow</text>

  <!-- 1. on_mqtt_message() box (box-mcu) -->
  <rect class="box-mcu" x="195" y="38" width="210" height="32" rx="4"/>
  <text class="text" x="300" y="59" text-anchor="middle" font-weight="bold">on_mqtt_message()</text>

  <!-- Arrow down -->
  <line class="wire" x1="300" y1="70" x2="300" y2="88"/>
  <polygon class="arrow" points="300,94 294,86 306,86"/>

  <!-- 2. Parse action box -->
  <rect class="box" x="180" y="96" width="240" height="32" rx="4"/>
  <text class="text" x="300" y="117" text-anchor="middle">parse action from JSON</text>

  <!-- Arrow down to diamond -->
  <line class="wire" x1="300" y1="128" x2="300" y2="148"/>
  <polygon class="arrow" points="300,154 294,146 306,146"/>

  <!-- 3. Diamond (branch point) -->
  <polygon class="box" points="300,156 340,180 300,204 260,180"/>
  <text class="text" x="300" y="184" text-anchor="middle" font-size="10">action?</text>

  <!-- Left branch: "request_capabilities" label on wire -->
  <line class="wire" x1="260" y1="180" x2="140" y2="180"/>
  <polygon class="arrow" points="134,180 142,174 142,186"/>
  <text class="text-dim" x="197" y="172" text-anchor="middle" font-size="10">"request_capabilities"</text>

  <!-- Left: publish_capabilities() box (box-mcu) -->
  <rect class="box-mcu" x="14" y="196" width="240" height="48" rx="4"/>
  <text class="text" x="134" y="217" text-anchor="middle" font-weight="bold">publish_capabilities()</text>
  <text class="text-dim" x="134" y="233" text-anchor="middle" font-size="10">send capabilities to MQTT</text>

  <!-- Wire from arrow endpoint down to the box -->
  <line class="wire" x1="134" y1="180" x2="134" y2="196"/>

  <!-- Right branch: "else" label on wire -->
  <line class="wire" x1="340" y1="180" x2="420" y2="180"/>
  <polygon class="arrow" points="426,180 418,174 418,186"/>
  <text class="text-dim" x="380" y="172" text-anchor="middle" font-size="10">else</text>

  <!-- Right: registry.dispatch() box (box-lib) -->
  <rect class="box-lib" x="326" y="196" width="260" height="48" rx="4"/>
  <text class="text" x="456" y="217" text-anchor="middle" font-weight="bold">registry.dispatch(action, payload)</text>
  <text class="text-dim" x="456" y="233" text-anchor="middle" font-size="10">ModuleRegistry</text>

  <!-- Wire from arrow endpoint down to the box -->
  <line class="wire" x1="456" y1="180" x2="456" y2="196"/>

  <!-- Arrow down from registry.dispatch -->
  <line class="wire" x1="456" y1="244" x2="456" y2="262"/>
  <polygon class="arrow" points="456,268 450,260 462,260"/>

  <!-- Sub-step 1: iterate handlers[] -->
  <rect class="box-lib" x="356" y="270" width="200" height="32" rx="4"/>
  <text class="text" x="456" y="291" text-anchor="middle">iterate handlers[]</text>

  <!-- Arrow down -->
  <line class="wire" x1="456" y1="302" x2="456" y2="318"/>
  <polygon class="arrow" points="456,324 450,316 462,316"/>

  <!-- Sub-step 2: call first matching handler -->
  <rect class="box-lib" x="326" y="326" width="260" height="32" rx="4"/>
  <text class="text" x="456" y="347" text-anchor="middle">call first matching handler</text>

  <!-- Legend -->
  <rect class="legend-bg" x="30" y="370" width="540" height="24" rx="4"/>
  <rect class="box-mcu" x="45" y="376" width="12" height="12" rx="2"/>
  <text class="text-dim" x="62" y="387" font-size="10">Core (main.cpp)</text>
  <rect class="box" x="185" y="376" width="12" height="12" rx="2"/>
  <text class="text-dim" x="202" y="387" font-size="10">Processing</text>
  <rect class="box-lib" x="300" y="376" width="12" height="12" rx="2"/>
  <text class="text-dim" x="317" y="387" font-size="10">Registry (lib)</text>
  <line class="wire" x1="415" y1="382" x2="445" y2="382"/>
  <polygon class="arrow" points="447,382 441,378 441,386"/>
  <text class="text-dim" x="453" y="387" font-size="10">Control flow</text>
</svg>
