<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 170" width="600" height="170">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="600" height="170" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="300" y="22" text-anchor="middle">1S Battery Power Chain (MKR WiFi 1010)</text>

  <!-- Cell -->
  <rect class="box" x="20" y="55" width="110" height="50" rx="4"/>
  <text class="text" x="75" y="77" text-anchor="middle">18650 Cell</text>
  <text class="text-dim" x="75" y="97" text-anchor="middle">~3.7V</text>

  <!-- Wire: Cell to JST -->
  <line class="wire-pwr" x1="130" y1="72" x2="190" y2="72"/>
  <polygon class="arrow" points="190,72 184,67 184,77"/>

  <!-- JST connector -->
  <rect class="box-lib" x="192" y="55" width="130" height="50" rx="4"/>
  <text class="text" x="257" y="77" text-anchor="middle">JST PH 2-pin</text>
  <text class="text-dim" x="257" y="97" text-anchor="middle">battery connector</text>

  <!-- Wire: JST to MKR -->
  <line class="wire-pwr" x1="322" y1="72" x2="380" y2="72"/>
  <polygon class="arrow" points="380,72 374,67 374,77"/>

  <!-- MKR board -->
  <rect class="box-mcu" x="382" y="45" width="195" height="70" rx="4"/>
  <text class="text" x="480" y="67" text-anchor="middle">MKR WiFi 1010</text>
  <text class="text-dim" x="480" y="87" text-anchor="middle">built-in BMS</text>
  <text class="text-dim" x="480" y="103" text-anchor="middle">(charge via USB)</text>

  <!-- USB charge arrow from above -->
  <line class="wire-sig" x1="480" y1="15" x2="480" y2="43"/>
  <polygon class="arrow" points="480,45 474,37 486,37"/>
  <text class="text-dim" x="520" y="32" text-anchor="start">USB charge</text>

  <!-- Legend -->
  <rect class="legend-bg" x="20" y="130" width="560" height="30" rx="4"/>
  <line class="wire-pwr" x1="35" y1="145" x2="65" y2="145"/>
  <text class="text-dim" x="70" y="149" font-size="10">Power (3.7V)</text>
  <line class="wire-sig" x1="195" y1="145" x2="225" y2="145"/>
  <text class="text-dim" x="230" y="149" font-size="10">USB (data + charge)</text>
</svg>
