<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" width="750" height="400">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="750" height="400" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="375" y="25" text-anchor="middle">Battery Config (2S 18650, Deep Sleep)</text>

  <!-- 18650 cells -->
  <rect class="box" x="30" y="55" width="100" height="55" rx="4"/>
  <text class="text" x="80" y="75" text-anchor="middle" font-weight="bold">18650 x2</text>
  <text class="text-dim" x="80" y="95" text-anchor="middle" font-size="10">2S (7.4V nom)</text>

  <!-- 2S BMS -->
  <rect class="box" x="165" y="55" width="100" height="55" rx="4"/>
  <text class="text" x="215" y="75" text-anchor="middle" font-weight="bold">2S BMS</text>
  <text class="text-dim" x="215" y="95" text-anchor="middle" font-size="10">6.0-8.4V</text>

  <!-- H78M05BT -->
  <rect class="box" x="300" y="55" width="120" height="55" rx="4"/>
  <text class="text" x="360" y="75" text-anchor="middle" font-weight="bold">H78M05BT</text>
  <text class="text-dim" x="360" y="95" text-anchor="middle" font-size="10">5V regulator</text>

  <!-- Battery to BMS -->
  <line class="wire-pwr" x1="130" y1="82" x2="165" y2="82"/>
  <polygon class="arrow" points="165,82 157,78 157,86"/>

  <!-- BMS to regulator -->
  <line class="wire-pwr" x1="265" y1="82" x2="300" y2="82"/>
  <polygon class="arrow" points="300,82 292,78 292,86"/>

  <!-- Capacitors note -->
  <text class="text-dim" x="360" y="125" text-anchor="middle" font-size="9">100nF in/out, 10uF/400V in</text>

  <!-- Wemos D1 Mini -->
  <rect class="box-mcu" x="480" y="45" width="220" height="195" rx="4"/>
  <text class="text" x="590" y="68" text-anchor="middle" font-weight="bold">Wemos D1 Mini</text>
  <text class="text-dim" x="590" y="84" text-anchor="middle" font-size="10">ESP8266</text>

  <!-- Pin labels -->
  <text class="text-dim" x="495" y="110" font-size="10">5V pin</text>
  <text class="text-dim" x="495" y="135" font-size="10">D0 (GPIO16)</text>
  <text class="text-dim" x="495" y="158" font-size="10">D1 (SCL)</text>
  <text class="text-dim" x="495" y="178" font-size="10">D2 (SDA)</text>
  <text class="text-dim" x="495" y="198" font-size="10">3V3</text>
  <text class="text-dim" x="495" y="222" font-size="10">A0</text>

  <!-- Regulator to Wemos 5V -->
  <line class="wire-pwr" x1="420" y1="82" x2="450" y2="82"/>
  <line class="wire-pwr" x1="450" y1="82" x2="450" y2="106"/>
  <line class="wire-pwr" x1="450" y1="106" x2="480" y2="106"/>
  <polygon class="arrow" points="480,106 472,102 472,110"/>
  <text class="text-dim" x="440" y="100" font-size="9">5V</text>

  <!-- D0 to RST (deep sleep) -->
  <rect class="box" x="580" y="120" width="105" height="30" rx="4"/>
  <text class="text-dim" x="633" y="140" text-anchor="middle" font-size="10">RST (wake-up)</text>
  <line class="wire-sig" x1="570" y1="131" x2="580" y2="135"/>
  <polygon class="arrow" points="580,135 572,131 572,139"/>

  <!-- BME280 -->
  <rect class="box-sensor" x="340" y="170" width="120" height="55" rx="4"/>
  <text class="text" x="400" y="192" text-anchor="middle" font-weight="bold">BME/BMP280</text>
  <text class="text-dim" x="400" y="210" text-anchor="middle" font-size="10">I2C</text>

  <!-- I2C to BME280 -->
  <line class="wire-i2c" x1="480" y1="164" x2="460" y2="190"/>
  <polygon class="arrow" points="460,190 457,181 464,183"/>
  <text class="text-dim" x="462" y="172" font-size="9">I2C</text>

  <!-- 3V3 to BME280 -->
  <line class="wire-pwr" x1="480" y1="194" x2="460" y2="194"/>
  <polygon class="arrow" points="460,194 468,190 468,198"/>

  <!-- Voltage divider -->
  <rect class="box" x="280" y="260" width="170" height="80" rx="4"/>
  <text class="text" x="365" y="280" text-anchor="middle" font-weight="bold">Voltage Divider</text>
  <text class="text-dim" x="365" y="298" text-anchor="middle" font-size="10">R1=22k / R2=12k (Zsrc=7.76k)</text>
  <text class="text-dim" x="365" y="316" text-anchor="middle" font-size="10">8.4V -> 2.96V (A0 range)</text>
  <text class="text-dim" x="365" y="330" text-anchor="middle" font-size="10">Iq = 247uA</text>

  <!-- BMS to voltage divider -->
  <line class="wire-sig" x1="215" y1="110" x2="215" y2="300"/>
  <line class="wire-sig" x1="215" y1="300" x2="280" y2="300"/>
  <polygon class="arrow" points="280,300 272,296 272,304"/>
  <text class="text-dim" x="225" y="210" font-size="9">P+</text>

  <!-- Voltage divider to A0 -->
  <line class="wire-sig" x1="450" y1="295" x2="470" y2="295"/>
  <line class="wire-sig" x1="470" y1="295" x2="470" y2="218"/>
  <line class="wire-sig" x1="470" y1="218" x2="480" y2="218"/>
  <polygon class="arrow" points="480,218 472,214 472,222"/>
  <text class="text-dim" x="455" y="258" font-size="9">A0</text>

  <!-- GND label -->
  <line class="wire-gnd" x1="365" y1="340" x2="365" y2="355"/>
  <text class="text-dim" x="375" y="365" font-size="10">GND</text>

  <!-- Legend -->
  <rect class="legend-bg" x="30" y="365" width="690" height="28" rx="4"/>
  <line class="wire-pwr" x1="45" y1="380" x2="75" y2="380"/>
  <text class="text-dim" x="80" y="384" font-size="10">Power</text>
  <line class="wire-i2c" x1="145" y1="380" x2="175" y2="380"/>
  <text class="text-dim" x="180" y="384" font-size="10">I2C</text>
  <line class="wire-sig" x1="225" y1="380" x2="255" y2="380"/>
  <text class="text-dim" x="260" y="384" font-size="10">Signal/ADC</text>
  <line class="wire-gnd" x1="355" y1="380" x2="385" y2="380"/>
  <text class="text-dim" x="390" y="384" font-size="10">Ground</text>
  <rect class="box-mcu" x="465" y="374" width="12" height="12" rx="2"/>
  <text class="text-dim" x="482" y="384" font-size="10">MCU</text>
  <rect class="box-sensor" x="525" y="374" width="12" height="12" rx="2"/>
  <text class="text-dim" x="542" y="384" font-size="10">Sensor</text>
</svg>