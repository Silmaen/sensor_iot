<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="400" y="25" text-anchor="middle">Cell Tester Hardware Setup (MKR WiFi 1010)</text>

  <!-- MKR WiFi 1010 (central) -->
  <rect class="box-mcu" x="260" y="55" width="280" height="200" rx="4"/>
  <text class="text" x="400" y="78" text-anchor="middle" font-weight="bold">MKR WiFi 1010</text>
  <text class="text-dim" x="400" y="96" text-anchor="middle" font-size="10">SAMD21 + BQ24195L PMIC</text>

  <!-- MKR pins -->
  <text class="text-dim" x="275" y="130" font-size="10">USB-C port</text>
  <text class="text-dim" x="275" y="155" font-size="10">5V pin</text>
  <text class="text-dim" x="275" y="180" font-size="10">GND pin</text>
  <text class="text-dim" x="275" y="210" font-size="10">JST connector</text>
  <text class="text-dim" x="275" y="240" font-size="10">ADC_BATTERY</text>

  <!-- Internal features -->
  <rect class="box" x="400" y="115" width="125" height="55" rx="4"/>
  <text class="text-dim" x="462" y="133" text-anchor="middle" font-size="10">BQ24195L</text>
  <text class="text-dim" x="462" y="148" text-anchor="middle" font-size="10">LiPo charger</text>
  <text class="text-dim" x="462" y="163" text-anchor="middle" font-size="10">I2C configurable</text>

  <rect class="box" x="400" y="180" width="125" height="35" rx="4"/>
  <text class="text-dim" x="462" y="200" text-anchor="middle" font-size="10">12-bit ADC</text>
  <text class="text-dim" x="462" y="212" text-anchor="middle" font-size="9">battery voltage</text>

  <!-- PC / Laptop (top left) -->
  <rect class="box" x="30" y="80" width="150" height="60" rx="4"/>
  <text class="text" x="105" y="103" text-anchor="middle" font-weight="bold">PC / Laptop</text>
  <text class="text-dim" x="105" y="123" text-anchor="middle" font-size="10">Serial monitor</text>
  <text class="text-dim" x="105" y="133" text-anchor="middle" font-size="9">(pio device monitor)</text>

  <!-- USB cable to MKR -->
  <line class="wire-sig" x1="180" y1="110" x2="220" y2="110"/>
  <line class="wire-sig" x1="220" y1="110" x2="220" y2="126"/>
  <line class="wire-sig" x1="220" y1="126" x2="260" y2="126"/>
  <polygon class="arrow" points="260,126 252,122 252,130"/>
  <text class="text-dim" x="205" y="105" font-size="9">USB</text>
  <text class="text-dim" x="205" y="117" font-size="9">data</text>

  <!-- USB wall charger (top right) -->
  <rect class="box" x="620" y="80" width="150" height="60" rx="4"/>
  <text class="text" x="695" y="100" text-anchor="middle" font-weight="bold">USB Wall</text>
  <text class="text" x="695" y="116" text-anchor="middle" font-weight="bold">Charger</text>
  <text class="text-dim" x="695" y="133" text-anchor="middle" font-size="10">&gt;= 1A, 5V</text>

  <!-- Wall charger to MKR 5V/GND -->
  <line class="wire-pwr" x1="620" y1="100" x2="580" y2="100"/>
  <line class="wire-pwr" x1="580" y1="100" x2="580" y2="151"/>
  <line class="wire-pwr" x1="580" y1="151" x2="540" y2="151"/>
  <polygon class="arrow" points="540,151 548,147 548,155"/>
  <text class="text-dim" x="583" y="130" font-size="9">+5V</text>

  <line class="wire-gnd" x1="620" y1="118" x2="594" y2="118"/>
  <line class="wire-gnd" x1="594" y1="118" x2="594" y2="176"/>
  <line class="wire-gnd" x1="594" y1="176" x2="540" y2="176"/>
  <polygon class="arrow" points="540,176 548,172 548,180"/>
  <text class="text-dim" x="597" y="155" font-size="9">GND</text>

  <!-- 18650 Cell (bottom left) -->
  <rect class="box-sensor" x="30" y="270" width="150" height="60" rx="4"/>
  <text class="text" x="105" y="293" text-anchor="middle" font-weight="bold">18650 Cell</text>
  <text class="text-dim" x="105" y="313" text-anchor="middle" font-size="10">under test (1S)</text>

  <!-- Cell to JST -->
  <line class="wire-pwr" x1="180" y1="290" x2="220" y2="290"/>
  <line class="wire-pwr" x1="220" y1="290" x2="220" y2="206"/>
  <line class="wire-pwr" x1="220" y1="206" x2="260" y2="206"/>
  <polygon class="arrow" points="260,206 252,202 252,210"/>
  <text class="text-dim" x="190" y="285" font-size="9">JST</text>

  <!-- Discharge circuit -->
  <rect class="box-lib" x="260" y="290" width="280" height="110" rx="4"/>
  <text class="text" x="400" y="313" text-anchor="middle" font-weight="bold">Discharge Circuit</text>

  <!-- Switch -->
  <rect class="box" x="290" y="325" width="100" height="35" rx="4"/>
  <text class="text" x="340" y="343" text-anchor="middle" font-size="11">Toggle Switch</text>
  <text class="text-dim" x="340" y="356" text-anchor="middle" font-size="9">ON/OFF</text>

  <!-- Resistor -->
  <rect class="box" x="410" y="325" width="110" height="35" rx="4"/>
  <text class="text" x="465" y="343" text-anchor="middle" font-size="11">7.3 ohm 10W</text>
  <text class="text-dim" x="465" y="356" text-anchor="middle" font-size="9">Sfernice RH10</text>

  <!-- Switch to resistor -->
  <line class="wire" x1="390" y1="342" x2="410" y2="342"/>

  <!-- Cell+ to switch (via JST+) -->
  <line class="wire-pwr" x1="220" y1="290" x2="220" y2="342"/>
  <line class="wire-pwr" x1="220" y1="342" x2="290" y2="342"/>
  <polygon class="arrow" points="290,342 282,338 282,346"/>
  <text class="text-dim" x="242" y="335" font-size="9">JST+</text>

  <!-- Resistor back to Cell- -->
  <line class="wire-gnd" x1="520" y1="342" x2="555" y2="342"/>
  <line class="wire-gnd" x1="555" y1="342" x2="555" y2="415"/>
  <line class="wire-gnd" x1="555" y1="415" x2="105" y2="415"/>
  <line class="wire-gnd" x1="105" y1="415" x2="105" y2="330"/>
  <polygon class="arrow" points="105,330 101,338 109,338"/>
  <text class="text-dim" x="320" y="430" text-anchor="middle" font-size="9">JST- (parallel with cell)</text>

  <!-- Operation notes -->
  <rect class="box" x="590" y="270" width="180" height="130" rx="4"/>
  <text class="text" x="680" y="290" text-anchor="middle" font-weight="bold" font-size="11">Operation</text>
  <text class="text-dim" x="600" y="310" font-size="10">Switch OFF:</text>
  <text class="text-dim" x="605" y="325" font-size="9">USB charges cell</text>
  <text class="text-dim" x="600" y="348" font-size="10">Switch ON:</text>
  <text class="text-dim" x="605" y="363" font-size="9">Discharge test</text>
  <text class="text-dim" x="605" y="378" font-size="9">(firmware disables</text>
  <text class="text-dim" x="605" y="391" font-size="9"> charger via I2C)</text>

  <!-- Legend -->
  <rect class="legend-bg" x="30" y="460" width="740" height="30" rx="4"/>
  <line class="wire-pwr" x1="45" y1="476" x2="75" y2="476"/>
  <text class="text-dim" x="80" y="480" font-size="10">Power (+)</text>
  <line class="wire-gnd" x1="165" y1="476" x2="195" y2="476"/>
  <text class="text-dim" x="200" y="480" font-size="10">Ground (-)</text>
  <line class="wire-sig" x1="285" y1="476" x2="315" y2="476"/>
  <text class="text-dim" x="320" y="480" font-size="10">USB data</text>
  <rect class="box-mcu" x="415" y="470" width="12" height="12" rx="2"/>
  <text class="text-dim" x="432" y="480" font-size="10">MCU</text>
  <rect class="box-sensor" x="485" y="470" width="12" height="12" rx="2"/>
  <text class="text-dim" x="502" y="480" font-size="10">Cell</text>
  <rect class="box-lib" x="555" y="470" width="12" height="12" rx="2"/>
  <text class="text-dim" x="572" y="480" font-size="10">Discharge</text>
</svg>