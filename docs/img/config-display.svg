<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" width="750" height="400">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="750" height="400" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="375" y="25" text-anchor="middle">Display Config (USB-powered)</text>

  <!-- USB Power source -->
  <rect class="box" x="30" y="60" width="110" height="40" rx="4"/>
  <text class="text" x="85" y="78" text-anchor="middle" font-weight="bold">USB 5V</text>
  <text class="text-dim" x="85" y="92" text-anchor="middle" font-size="10">Power + Data</text>

  <!-- Wemos D1 Mini (central MCU) -->
  <rect class="box-mcu" x="220" y="45" width="200" height="200" rx="4"/>
  <text class="text" x="320" y="68" text-anchor="middle" font-weight="bold">Wemos D1 Mini</text>
  <text class="text-dim" x="320" y="84" text-anchor="middle" font-size="10">ESP8266</text>

  <!-- Pin labels inside MCU -->
  <text class="text-dim" x="235" y="110" font-size="10">5V pin</text>
  <text class="text-dim" x="235" y="130" font-size="10">3V3 pin</text>
  <text class="text-dim" x="235" y="155" font-size="10">D7, D5, D8</text>
  <text class="text-dim" x="235" y="180" font-size="10">D1 (SCL)</text>
  <text class="text-dim" x="235" y="200" font-size="10">D2 (SDA)</text>
  <text class="text-dim" x="235" y="225" font-size="10">D6 (GPIO12)</text>

  <!-- USB to Wemos -->
  <line class="wire-pwr" x1="140" y1="75" x2="220" y2="75"/>
  <polygon class="arrow" points="220,75 212,71 212,79"/>

  <!-- BME280 sensor -->
  <rect class="box-sensor" x="530" y="140" width="170" height="60" rx="4"/>
  <text class="text" x="615" y="162" text-anchor="middle" font-weight="bold">BME/BMP280</text>
  <text class="text-dim" x="615" y="180" text-anchor="middle" font-size="10">I2C (0x76)</text>

  <!-- I2C wires to BME280 -->
  <line class="wire-i2c" x1="420" y1="175" x2="530" y2="170"/>
  <polygon class="arrow" points="530,170 522,166 522,174"/>
  <text class="text-dim" x="468" y="164" font-size="9">I2C</text>

  <!-- 3V3 to BME280 -->
  <line class="wire-pwr" x1="420" y1="126" x2="470" y2="126"/>
  <line class="wire-pwr" x1="470" y1="126" x2="470" y2="148"/>
  <line class="wire-pwr" x1="470" y1="148" x2="530" y2="148"/>
  <text class="text-dim" x="490" y="143" font-size="9">3.3V</text>

  <!-- HC595 shift registers -->
  <rect class="box" x="530" y="50" width="170" height="60" rx="4"/>
  <text class="text" x="615" y="72" text-anchor="middle" font-weight="bold">HC595 x2</text>
  <text class="text-dim" x="615" y="90" text-anchor="middle" font-size="10">Shift registers</text>

  <!-- Signal wires to HC595 -->
  <line class="wire-sig" x1="420" y1="151" x2="450" y2="151"/>
  <line class="wire-sig" x1="450" y1="151" x2="450" y2="80"/>
  <line class="wire-sig" x1="450" y1="80" x2="530" y2="80"/>
  <polygon class="arrow" points="530,80 522,76 522,84"/>
  <text class="text-dim" x="460" y="118" font-size="9">SER/CLK/LATCH</text>

  <!-- 7-Segment Display -->
  <rect class="box-lib" x="530" y="230" width="170" height="60" rx="4"/>
  <text class="text" x="615" y="252" text-anchor="middle" font-weight="bold">7-Segment Display</text>
  <text class="text-dim" x="615" y="270" text-anchor="middle" font-size="10">3 digits (via LS247)</text>

  <!-- HC595 to Display -->
  <line class="wire-sig" x1="615" y1="110" x2="615" y2="138"/>
  <text class="text-dim" x="625" y="128" font-size="9">BCD</text>

  <!-- LS247/LS04 in between -->
  <line class="wire-sig" x1="615" y1="200" x2="615" y2="230"/>
  <polygon class="arrow" points="615,230 609,222 621,222"/>

  <!-- 5V to display logic -->
  <line class="wire-pwr" x1="420" y1="106" x2="440" y2="106"/>
  <line class="wire-pwr" x1="440" y1="106" x2="440" y2="40"/>
  <line class="wire-pwr" x1="440" y1="40" x2="720" y2="40"/>
  <line class="wire-pwr" x1="720" y1="40" x2="720" y2="260"/>
  <text class="text-dim" x="640" y="36" font-size="9">5V rail (LS247 x3, LS04 x2)</text>

  <!-- Push button -->
  <rect class="box" x="530" y="310" width="170" height="50" rx="4"/>
  <text class="text" x="615" y="332" text-anchor="middle" font-weight="bold">Push Button</text>
  <text class="text-dim" x="615" y="348" text-anchor="middle" font-size="10">+ 100nF debounce</text>

  <!-- Wire to push button -->
  <line class="wire-sig" x1="420" y1="221" x2="460" y2="221"/>
  <line class="wire-sig" x1="460" y1="221" x2="460" y2="335"/>
  <line class="wire-sig" x1="460" y1="335" x2="530" y2="335"/>
  <polygon class="arrow" points="530,335 522,331 522,339"/>
  <text class="text-dim" x="470" y="285" font-size="9">D6</text>

  <!-- Legend -->
  <rect class="legend-bg" x="30" y="365" width="690" height="28" rx="4"/>
  <line class="wire-pwr" x1="45" y1="380" x2="75" y2="380"/>
  <text class="text-dim" x="80" y="384" font-size="10">Power</text>
  <line class="wire-i2c" x1="145" y1="380" x2="175" y2="380"/>
  <text class="text-dim" x="180" y="384" font-size="10">I2C</text>
  <line class="wire-sig" x1="225" y1="380" x2="255" y2="380"/>
  <text class="text-dim" x="260" y="384" font-size="10">Signal</text>
  <rect class="box-mcu" x="325" y="374" width="12" height="12" rx="2"/>
  <text class="text-dim" x="342" y="384" font-size="10">MCU</text>
  <rect class="box-sensor" x="395" y="374" width="12" height="12" rx="2"/>
  <text class="text-dim" x="412" y="384" font-size="10">Sensor</text>
  <rect class="box" x="475" y="374" width="12" height="12" rx="2"/>
  <text class="text-dim" x="492" y="384" font-size="10">Peripheral</text>
</svg>