<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace" font-size="12">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a2e; }
        .text { fill: #e0e0e0; }
        .text-dim { fill: #999; }
        .wire { stroke: #ccc; }
        .wire-pwr { stroke: #ff6b6b; }
        .wire-gnd { stroke: #74b9ff; }
        .wire-sig { stroke: #a29bfe; }
        .wire-sda { stroke: #fdcb6e; }
        .wire-scl { stroke: #55efc4; }
        .board-outline { stroke: #aaa; }
        .pin-dot { fill: #ccc; }
        .legend-bg { fill: #2a2a3e; stroke: #555; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .text { fill: #333; }
        .text-dim { fill: #777; }
        .wire { stroke: #333; }
        .wire-pwr { stroke: #c0392b; }
        .wire-gnd { stroke: #2c3e50; }
        .wire-sig { stroke: #2980b9; }
        .wire-sda { stroke: #e17055; }
        .wire-scl { stroke: #00b894; }
        .board-outline { stroke: #555; }
        .pin-dot { fill: #555; }
        .legend-bg { fill: #f8f8f8; stroke: #ccc; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" class="text">BME280 Wiring — Wemos D1 Mini (ESP8266)</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" class="text-dim">I2C connection — address 0x76</text>

  <!-- ==================== WEMOS D1 MINI ==================== -->
  <!-- PCB body -->
  <rect x="80" y="90" width="220" height="340" rx="8" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <!-- USB connector -->
  <rect x="155" y="80" width="70" height="20" rx="3" fill="#888" stroke="#666" stroke-width="1.5"/>
  <text x="190" y="94" text-anchor="middle" font-size="9" fill="#fff">USB</text>
  <!-- ESP module -->
  <rect x="120" y="140" width="140" height="80" rx="4" fill="#263238" stroke="#37474f" stroke-width="1"/>
  <text x="190" y="175" text-anchor="middle" font-size="10" fill="#aaa">ESP-8266</text>
  <text x="190" y="190" text-anchor="middle" font-size="9" fill="#777">Wemos D1 Mini</text>
  <!-- Antenna -->
  <path d="M170 140 L170 125 L210 125 L210 140" fill="none" stroke="#37474f" stroke-width="1.5"/>

  <!-- Left pins (top to bottom) -->
  <circle cx="95" cy="250" r="4" class="pin-dot"/><text x="110" y="254" font-size="10" class="text">RST</text>
  <circle cx="95" cy="275" r="4" class="pin-dot"/><text x="110" y="279" font-size="10" class="text">A0</text>
  <circle cx="95" cy="300" r="4" class="pin-dot"/><text x="110" y="304" font-size="10" class="text">D0</text>
  <circle cx="95" cy="325" r="4" fill="#00b894"/><text x="110" y="329" font-size="10" font-weight="bold" class="text">D1</text>
  <circle cx="95" cy="350" r="4" fill="#e17055"/><text x="110" y="354" font-size="10" font-weight="bold" class="text">D2</text>
  <circle cx="95" cy="375" r="4" class="pin-dot"/><text x="110" y="379" font-size="10" class="text">D3</text>
  <circle cx="95" cy="400" r="4" class="pin-dot"/><text x="110" y="404" font-size="10" class="text">D4</text>

  <!-- Right pins (top to bottom) -->
  <circle cx="285" cy="250" r="4" class="pin-dot"/><text x="260" y="254" font-size="10" text-anchor="end" class="text">TX</text>
  <circle cx="285" cy="275" r="4" class="pin-dot"/><text x="260" y="279" font-size="10" text-anchor="end" class="text">RX</text>
  <circle cx="285" cy="300" r="4" class="pin-dot"/><text x="260" y="304" font-size="10" text-anchor="end" class="text">D5</text>
  <circle cx="285" cy="325" r="4" class="pin-dot"/><text x="260" y="329" font-size="10" text-anchor="end" class="text">D6</text>
  <circle cx="285" cy="350" r="4" class="pin-dot"/><text x="260" y="354" font-size="10" text-anchor="end" class="text">D7</text>
  <circle cx="285" cy="375" r="4" class="pin-dot"/><text x="260" y="379" font-size="10" text-anchor="end" class="text">D8</text>
  <circle cx="285" cy="400" r="4" class="pin-dot"/><text x="260" y="404" font-size="10" text-anchor="end" class="text">GND</text>

  <!-- Bottom pins -->
  <circle cx="150" cy="420" r="4" fill="#c0392b"/><text x="150" y="440" font-size="10" text-anchor="middle" font-weight="bold" class="text">3V3</text>
  <circle cx="230" cy="420" r="4" fill="#2c3e50"/><text x="230" y="440" font-size="10" text-anchor="middle" font-weight="bold" class="text">GND</text>

  <!-- GPIO labels -->
  <text x="77" y="329" font-size="9" text-anchor="end" class="text-dim">GPIO5</text>
  <text x="77" y="354" font-size="9" text-anchor="end" class="text-dim">GPIO4</text>

  <!-- ==================== BME280 BREAKOUT ==================== -->
  <!-- PCB body -->
  <rect x="530" y="190" width="180" height="180" rx="6" fill="#7b1fa2" stroke="#4a148c" stroke-width="2"/>
  <!-- Sensor chip -->
  <rect x="585" y="230" width="70" height="50" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="620" y="252" text-anchor="middle" font-size="9" fill="#aaa">BOSCH</text>
  <text x="620" y="266" text-anchor="middle" font-size="10" fill="#ccc" font-weight="bold">BME280</text>
  <!-- Vent hole -->
  <circle cx="620" cy="275" r="2" fill="#555"/>

  <text x="620" y="310" text-anchor="middle" font-size="10" fill="#ddd">GY-BME280</text>
  <text x="620" y="325" text-anchor="middle" font-size="9" fill="#aaa">Breakout Board</text>

  <!-- Pins on left side of breakout -->
  <circle cx="545" cy="225" r="4" fill="#c0392b"/><text x="560" y="229" font-size="10" font-weight="bold" fill="#fff">VCC</text>
  <circle cx="545" cy="260" r="4" fill="#2c3e50"/><text x="560" y="264" font-size="10" font-weight="bold" fill="#fff">GND</text>
  <circle cx="545" cy="295" r="4" fill="#00b894"/><text x="560" y="299" font-size="10" font-weight="bold" fill="#fff">SCL</text>
  <circle cx="545" cy="330" r="4" fill="#e17055"/><text x="560" y="334" font-size="10" font-weight="bold" fill="#fff">SDA</text>

  <!-- ==================== WIRES ==================== -->
  <!-- VCC: 3V3 -> VCC (red) -->
  <path d="M150 420 L150 460 L500 460 L500 225 L545 225"
        fill="none" class="wire-pwr" stroke-width="2.5" stroke-linecap="round"/>
  <text x="430" y="455" font-size="9" class="text-dim">3.3V power</text>

  <!-- GND: GND -> GND (dark) -->
  <path d="M230 420 L230 475 L510 475 L510 260 L545 260"
        fill="none" class="wire-gnd" stroke-width="2.5" stroke-linecap="round"/>
  <text x="430" y="480" font-size="9" class="text-dim">Ground</text>

  <!-- SCL: D1 -> SCL (green) -->
  <path d="M95 325 L60 325 L60 295 L545 295"
        fill="none" class="wire-scl" stroke-width="2.5" stroke-linecap="round"/>
  <text x="320" y="290" font-size="9" class="text-dim">SCL (I2C clock)</text>

  <!-- SDA: D2 -> SDA (yellow/orange) -->
  <path d="M95 350 L50 350 L50 330 L545 330"
        fill="none" class="wire-sda" stroke-width="2.5" stroke-linecap="round"/>
  <text x="320" y="345" font-size="9" class="text-dim">SDA (I2C data)</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="560" y="400" width="220" height="90" rx="6" class="legend-bg" stroke-width="1"/>
  <text x="670" y="418" text-anchor="middle" font-size="11" font-weight="bold" class="text">Legend</text>
  <line x1="575" y1="432" x2="600" y2="432" class="wire-pwr" stroke-width="2.5"/>
  <text x="610" y="436" font-size="10" class="text">VCC (3.3V)</text>
  <line x1="575" y1="448" x2="600" y2="448" class="wire-gnd" stroke-width="2.5"/>
  <text x="610" y="452" font-size="10" class="text">GND</text>
  <line x1="575" y1="464" x2="600" y2="464" class="wire-scl" stroke-width="2.5"/>
  <text x="610" y="468" font-size="10" class="text">SCL (D1 / GPIO5)</text>
  <line x1="575" y1="480" x2="600" y2="480" class="wire-sda" stroke-width="2.5"/>
  <text x="610" y="484" font-size="10" class="text">SDA (D2 / GPIO4)</text>
</svg>
