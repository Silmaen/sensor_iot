<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 440" width="750" height="440">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .wire-ana { stroke: #fdcb6e; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .wire-ana { stroke: #e17055; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="750" height="440" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="375" y="25" text-anchor="middle">MKR Config (Arduino MKR WiFi 1010 + ENV Shield)</text>

  <!-- 18650 cell -->
  <rect class="box" x="30" y="100" width="120" height="55" rx="4"/>
  <text class="text" x="90" y="120" text-anchor="middle" font-weight="bold">18650 cell</text>
  <text class="text-dim" x="90" y="140" text-anchor="middle" font-size="10">3.7V (1S LiPo)</text>

  <!-- JST connector -->
  <rect class="box" x="185" y="100" width="100" height="55" rx="4"/>
  <text class="text" x="235" y="120" text-anchor="middle" font-weight="bold">JST PH</text>
  <text class="text-dim" x="235" y="140" text-anchor="middle" font-size="10">2-pin connector</text>

  <!-- Cell to JST -->
  <line class="wire-pwr" x1="150" y1="127" x2="185" y2="127"/>
  <polygon class="arrow" points="185,127 177,123 177,131"/>

  <!-- MKR WiFi 1010 -->
  <rect class="box-mcu" x="330" y="50" width="230" height="210" rx="4"/>
  <text class="text" x="445" y="75" text-anchor="middle" font-weight="bold">MKR WiFi 1010</text>
  <text class="text-dim" x="445" y="93" text-anchor="middle" font-size="10">SAMD21 + BQ24195L</text>

  <!-- JST input on MKR -->
  <text class="text-dim" x="345" y="127" font-size="10">JST in</text>
  <line class="wire-pwr" x1="285" y1="127" x2="330" y2="127"/>
  <polygon class="arrow" points="330,127 322,123 322,131"/>
  <text class="text-dim" x="345" y="147" font-size="10">(built-in charger)</text>

  <!-- WiFiNINA on-board -->
  <rect class="box" x="355" y="160" width="185" height="40" rx="4"/>
  <text class="text" x="448" y="178" text-anchor="middle" font-size="11">WiFiNINA (on-board)</text>
  <text class="text-dim" x="448" y="192" text-anchor="middle" font-size="9">NINA-W102 module</text>

  <!-- ADC_BATTERY -->
  <rect class="box" x="355" y="210" width="185" height="35" rx="4"/>
  <text class="text" x="448" y="230" text-anchor="middle" font-size="11">ADC_BATTERY</text>
  <text class="text-dim" x="448" y="240" text-anchor="middle" font-size="9">built-in divider, 12-bit</text>

  <!-- MKR ENV Shield -->
  <rect class="box-sensor" x="600" y="50" width="130" height="230" rx="4"/>
  <text class="text" x="665" y="72" text-anchor="middle" font-weight="bold" font-size="11">MKR ENV Shield</text>
  <text class="text-dim" x="665" y="86" text-anchor="middle" font-size="9">(stacked)</text>

  <!-- HTS221 inside ENV Shield -->
  <rect class="box-sensor" x="612" y="95" width="106" height="30" rx="4" style="opacity:0.7"/>
  <text class="text" x="665" y="112" text-anchor="middle" font-size="10">HTS221</text>
  <text class="text-dim" x="665" y="122" text-anchor="middle" font-size="8">temp + hum (I2C 0x5F)</text>

  <!-- LPS22HB inside ENV Shield -->
  <rect class="box-sensor" x="612" y="132" width="106" height="30" rx="4" style="opacity:0.7"/>
  <text class="text" x="665" y="149" text-anchor="middle" font-size="10">LPS22HB</text>
  <text class="text-dim" x="665" y="159" text-anchor="middle" font-size="8">pressure (I2C 0x5C)</text>

  <!-- VEML6075 inside ENV Shield -->
  <rect class="box-sensor" x="612" y="169" width="106" height="30" rx="4" style="opacity:0.7"/>
  <text class="text" x="665" y="186" text-anchor="middle" font-size="10">VEML6075</text>
  <text class="text-dim" x="665" y="196" text-anchor="middle" font-size="8">UV index (I2C 0x10)</text>

  <!-- TEMT6000 inside ENV Shield -->
  <rect class="box-sensor" x="612" y="206" width="106" height="30" rx="4" style="opacity:0.7"/>
  <text class="text" x="665" y="223" text-anchor="middle" font-size="10">TEMT6000</text>
  <text class="text-dim" x="665" y="233" text-anchor="middle" font-size="8">light (analog A2)</text>

  <!-- MKR to ENV Shield I2C -->
  <line class="wire-i2c" x1="560" y1="140" x2="612" y2="140"/>
  <polygon class="arrow" points="612,140 604,136 604,144"/>
  <text class="text-dim" x="565" y="134" font-size="9">I2C (Wire)</text>

  <!-- MKR to ENV Shield analog -->
  <line class="wire-ana" x1="560" y1="220" x2="612" y2="220"/>
  <polygon class="arrow" points="612,220 604,216 604,224"/>
  <text class="text-dim" x="568" y="215" font-size="9">A2</text>

  <!-- USB charging note -->
  <rect class="box" x="30" y="200" width="120" height="40" rx="4"/>
  <text class="text" x="90" y="218" text-anchor="middle" font-size="11">USB-C</text>
  <text class="text-dim" x="90" y="232" text-anchor="middle" font-size="9">charges cell</text>

  <line class="wire-pwr" x1="150" y1="215" x2="200" y2="215"/>
  <line class="wire-pwr" x1="200" y1="215" x2="200" y2="165"/>
  <line class="wire-pwr" x1="200" y1="165" x2="330" y2="165"/>
  <polygon class="arrow" points="330,165 322,161 322,169"/>
  <text class="text-dim" x="240" y="160" font-size="9">USB-C port</text>

  <!-- Features summary -->
  <rect class="box-lib" x="30" y="300" width="690" height="90" rx="4"/>
  <text class="text" x="375" y="320" text-anchor="middle" font-weight="bold">Key Features</text>
  <text class="text-dim" x="170" y="340" text-anchor="middle" font-size="10">Built-in LiPo charger (BQ24195L)</text>
  <text class="text-dim" x="520" y="340" text-anchor="middle" font-size="10">No deep sleep (continuous loop)</text>
  <text class="text-dim" x="170" y="358" text-anchor="middle" font-size="10">ADC_BATTERY for voltage monitoring</text>
  <text class="text-dim" x="520" y="358" text-anchor="middle" font-size="10">ENV Shield stacks with zero wiring</text>
  <text class="text-dim" x="375" y="376" text-anchor="middle" font-size="10">4 sensors: HTS221, LPS22HB, TEMT6000, VEML6075</text>

  <!-- Legend -->
  <rect class="legend-bg" x="30" y="405" width="690" height="28" rx="4"/>
  <line class="wire-pwr" x1="45" y1="420" x2="75" y2="420"/>
  <text class="text-dim" x="80" y="424" font-size="10">Power</text>
  <line class="wire-i2c" x1="155" y1="420" x2="185" y2="420"/>
  <text class="text-dim" x="190" y="424" font-size="10">I2C</text>
  <line class="wire-ana" x1="250" y1="420" x2="280" y2="420"/>
  <text class="text-dim" x="285" y="424" font-size="10">Analog</text>
  <rect class="box-mcu" x="365" y="414" width="12" height="12" rx="2"/>
  <text class="text-dim" x="382" y="424" font-size="10">MCU</text>
  <rect class="box-sensor" x="435" y="414" width="12" height="12" rx="2"/>
  <text class="text-dim" x="452" y="424" font-size="10">Sensor</text>
  <rect class="box-lib" x="515" y="414" width="12" height="12" rx="2"/>
  <text class="text-dim" x="532" y="424" font-size="10">Info</text>
</svg>
