<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="820" height="520" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="410" y="25" text-anchor="middle">Display Shift Register Chain Architecture</text>

  <!-- D1 Mini MCU box -->
  <rect class="box-mcu" x="30" y="60" width="160" height="50" rx="4"/>
  <text class="text" x="110" y="82" text-anchor="middle" font-weight="bold">D1 Mini</text>
  <text class="text-dim" x="110" y="98" text-anchor="middle">GPIO13 (SER)</text>

  <!-- Arrow from MCU to HC595 #1 -->
  <line class="wire-sig" x1="190" y1="85" x2="250" y2="85"/>
  <polygon class="arrow" points="256,85 248,79 248,91"/>

  <!-- HC595 #1 box -->
  <rect class="box" x="258" y="45" width="140" height="80" rx="4"/>
  <text class="text" x="328" y="68" text-anchor="middle" font-weight="bold">HC595 #1</text>
  <text class="text-dim" x="328" y="84" text-anchor="middle">(low byte)</text>
  <text class="text-dim" x="328" y="100" text-anchor="middle">3.3V rail</text>

  <!-- Arrow from HC595 #1 QH' to HC595 #2 -->
  <line class="wire-sig" x1="398" y1="85" x2="468" y2="85"/>
  <polygon class="arrow" points="474,85 466,79 466,91"/>
  <text class="text-dim" x="433" y="78" text-anchor="middle" font-size="10">QH'</text>

  <!-- HC595 #2 box -->
  <rect class="box" x="476" y="45" width="140" height="80" rx="4"/>
  <text class="text" x="546" y="68" text-anchor="middle" font-weight="bold">HC595 #2</text>
  <text class="text-dim" x="546" y="84" text-anchor="middle">(high byte)</text>
  <text class="text-dim" x="546" y="100" text-anchor="middle">3.3V rail</text>

  <!-- ====== LEFT SIDE: HC595 #1 outputs ====== -->

  <!-- Q0-Q3 arrow down from HC595 #1 -->
  <line class="wire" x1="298" y1="125" x2="298" y2="160"/>
  <polygon class="arrow" points="298,166 292,158 304,158"/>
  <text class="text-dim" x="282" y="148" text-anchor="end" font-size="10">Q0-Q3</text>

  <!-- LS04 #1 box -->
  <rect class="box" x="238" y="168" width="120" height="44" rx="4"/>
  <text class="text" x="298" y="186" text-anchor="middle" font-weight="bold">LS04 #1</text>
  <text class="text-dim" x="298" y="202" text-anchor="middle">(invert)</text>

  <!-- Arrow down from LS04 #1 to LS247 #1 -->
  <line class="wire" x1="298" y1="212" x2="298" y2="242"/>
  <polygon class="arrow" points="298,248 292,240 304,240"/>

  <!-- LS247 #1 box -->
  <rect class="box" x="238" y="250" width="120" height="44" rx="4"/>
  <text class="text" x="298" y="268" text-anchor="middle" font-weight="bold">LS247 #1</text>
  <text class="text-dim" x="298" y="284" text-anchor="middle">BCD decoder</text>

  <!-- Arrow from LS247 #1 to Digit 0 -->
  <line class="wire" x1="298" y1="294" x2="298" y2="324"/>
  <polygon class="arrow" points="298,330 292,322 304,322"/>

  <!-- Digit 0 display box -->
  <rect class="box-sensor" x="238" y="332" width="120" height="44" rx="4"/>
  <text class="text" x="298" y="350" text-anchor="middle" font-weight="bold">Digit 0</text>
  <text class="text-dim" x="298" y="366" text-anchor="middle">(CC, 5082-7651)</text>

  <!-- Q4-Q7 arrow down from HC595 #1 (right side) -->
  <line class="wire" x1="358" y1="125" x2="358" y2="160"/>
  <polygon class="arrow" points="358,166 352,158 364,158"/>
  <text class="text-dim" x="374" y="148" font-size="10">Q4-Q7</text>

  <!-- LS04 #2 box -->
  <rect class="box" x="98" y="168" width="120" height="44" rx="4"/>
  <text class="text" x="158" y="186" text-anchor="middle" font-weight="bold">LS04 #2</text>
  <text class="text-dim" x="158" y="202" text-anchor="middle">(invert)</text>

  <!-- Horizontal wire from Q4-Q7 drop to LS04 #2 -->
  <line class="wire" x1="358" y1="166" x2="358" y2="190"/>
  <line class="wire" x1="358" y1="190" x2="224" y2="190"/>
  <polygon class="arrow" points="218,190 226,184 226,196"/>

  <!-- Arrow down from LS04 #2 to LS247 #2 -->
  <line class="wire" x1="158" y1="212" x2="158" y2="242"/>
  <polygon class="arrow" points="158,248 152,240 164,240"/>

  <!-- LS247 #2 box -->
  <rect class="box" x="98" y="250" width="120" height="44" rx="4"/>
  <text class="text" x="158" y="268" text-anchor="middle" font-weight="bold">LS247 #2</text>
  <text class="text-dim" x="158" y="284" text-anchor="middle">BCD decoder</text>

  <!-- Arrow from LS247 #2 to Digit 1 -->
  <line class="wire" x1="158" y1="294" x2="158" y2="324"/>
  <polygon class="arrow" points="158,330 152,322 164,322"/>

  <!-- Digit 1 display box -->
  <rect class="box-sensor" x="98" y="332" width="120" height="44" rx="4"/>
  <text class="text" x="158" y="350" text-anchor="middle" font-weight="bold">Digit 1</text>
  <text class="text-dim" x="158" y="366" text-anchor="middle">(CC, 5082-7651)</text>

  <!-- ====== RIGHT SIDE: HC595 #2 outputs ====== -->

  <!-- Q0-Q3 arrow down from HC595 #2 -->
  <line class="wire" x1="516" y1="125" x2="516" y2="242"/>
  <polygon class="arrow" points="516,248 510,240 522,240"/>
  <text class="text-dim" x="500" y="148" text-anchor="end" font-size="10">Q0-Q3</text>

  <!-- (direct) label -->
  <text class="text-dim" x="530" y="188" font-size="10">(direct)</text>

  <!-- LS247 #3 box -->
  <rect class="box" x="456" y="250" width="120" height="44" rx="4"/>
  <text class="text" x="516" y="268" text-anchor="middle" font-weight="bold">LS247 #3</text>
  <text class="text-dim" x="516" y="284" text-anchor="middle">BCD decoder</text>

  <!-- Arrow from LS247 #3 to Digit 2 -->
  <line class="wire" x1="516" y1="294" x2="516" y2="324"/>
  <polygon class="arrow" points="516,330 510,322 522,322"/>

  <!-- Digit 2 display box -->
  <rect class="box-sensor" x="456" y="332" width="120" height="44" rx="4"/>
  <text class="text" x="516" y="350" text-anchor="middle" font-weight="bold">Digit 2</text>
  <text class="text-dim" x="516" y="366" text-anchor="middle">(CA, 5082-7653)</text>

  <!-- Q4-Q6 arrow down from HC595 #2 (right side) -->
  <line class="wire" x1="576" y1="125" x2="576" y2="160"/>
  <polygon class="arrow" points="576,166 570,158 582,158"/>
  <text class="text-dim" x="592" y="148" font-size="10">Q4-Q6</text>

  <!-- Decimal points box -->
  <rect class="box" x="636" y="168" width="140" height="60" rx="4"/>
  <text class="text" x="706" y="186" text-anchor="middle" font-weight="bold">Decimal Points</text>
  <text class="text-dim" x="706" y="202" text-anchor="middle">Q4: DP0 (digit 0)</text>
  <text class="text-dim" x="706" y="218" text-anchor="middle">Q5: DP1 (digit 1)</text>

  <!-- Horizontal wire from Q4-Q6 to decimal points -->
  <line class="wire" x1="576" y1="166" x2="576" y2="198"/>
  <line class="wire" x1="576" y1="198" x2="630" y2="198"/>
  <polygon class="arrow" points="636,198 628,192 628,204"/>

  <!-- Q6: DP2 text inside box -->
  <text class="text-dim" x="706" y="218" text-anchor="middle">Q6: DP2 (digit 2)</text>

  <!-- Power domains note -->
  <rect class="legend-bg" x="30" y="400" width="760" height="44" rx="4"/>
  <text class="text-dim" x="410" y="418" text-anchor="middle" font-size="11">Power domains: HC595 on 3.3V (from D1 Mini) | LS04, LS247, displays on 5V (from H78M05BT regulator)</text>
  <text class="text-dim" x="410" y="434" text-anchor="middle" font-size="11">HC595 3.3V outputs are TTL-compatible with 5V LS-series inputs (3.3V > V_IH = 2.0V)</text>

  <!-- Legend -->
  <rect class="legend-bg" x="30" y="460" width="760" height="50" rx="4"/>
  <rect class="box-mcu" x="45" y="470" width="12" height="12" rx="2"/>
  <text class="text-dim" x="62" y="481" font-size="10">MCU</text>
  <rect class="box" x="110" y="470" width="12" height="12" rx="2"/>
  <text class="text-dim" x="127" y="481" font-size="10">Logic ICs (HC595, LS04, LS247)</text>
  <rect class="box-sensor" x="330" y="470" width="12" height="12" rx="2"/>
  <text class="text-dim" x="347" y="481" font-size="10">7-Segment Displays</text>
  <line class="wire-sig" x1="505" y1="476" x2="535" y2="476"/>
  <polygon class="arrow" points="537,476 531,472 531,480"/>
  <text class="text-dim" x="543" y="481" font-size="10">Serial data</text>
  <line class="wire" x1="620" y1="476" x2="650" y2="476"/>
  <polygon class="arrow" points="652,476 646,472 646,480"/>
  <text class="text-dim" x="658" y="481" font-size="10">Parallel output</text>
  <text class="text-dim" x="410" y="500" text-anchor="middle" font-size="10">CC = Common Cathode | CA = Common Anode</text>
</svg>