<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" font-family="monospace" font-size="12">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a2e; }
        .text { fill: #e0e0e0; }
        .text-dim { fill: #999; }
        .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
        .comp { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; }
        .comp-bms { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; }
        .comp-buck { fill: #3a3a2e; stroke: #8a8a5e; stroke-width: 1.5; }
        .comp-cap { fill: #4a3a2e; stroke: #9a7a5e; stroke-width: 1.5; }
        .comp-cell { fill: #3e3a2a; stroke: #8e8a5a; stroke-width: 1.5; }
        .comp-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; }
        .legend-bg { fill: #22223a; stroke: #444; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .text { fill: #333; }
        .text-dim { fill: #999; }
        .wire { stroke: #333; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
        .comp { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; }
        .comp-bms { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; }
        .comp-buck { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
        .comp-cap { fill: #fdebd0; stroke: #e67e22; stroke-width: 1.5; }
        .comp-cell { fill: #fef9e7; stroke: #d4ac0d; stroke-width: 1.5; }
        .comp-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; }
        .legend-bg { fill: #f8f9fa; stroke: #ddd; }
      }
    </style>
  </defs>

  <rect width="850" height="450" class="bg" rx="4"/>

  <!-- Title -->
  <text x="425" y="28" text-anchor="middle" font-size="15" font-weight="bold" class="text">Battery Monitoring — Schematic (ESP8266 / 2S LiPo)</text>

  <!-- ==================== BATTERY SYMBOL (2S stacked) ==================== -->
  <!-- Top wire (V+) -->
  <line x1="60" y1="70" x2="60" y2="90" class="wire-pwr"/>
  <text x="45" y="78" text-anchor="end" font-size="10" font-weight="bold" class="text">+</text>

  <!-- Cell 1: long line (+) then short line (-) -->
  <line x1="45" y1="90" x2="75" y2="90" stroke-width="3" class="wire-pwr"/>
  <line x1="50" y1="100" x2="70" y2="100" stroke-width="1.5" class="wire"/>

  <!-- Wire between cells -->
  <line x1="60" y1="100" x2="60" y2="115" class="wire"/>

  <!-- Mid-point tap -->
  <circle cx="60" cy="108" r="3" fill="#a29bfe"/>
  <line x1="60" y1="108" x2="85" y2="108" class="wire"/>
  <text x="90" y="112" font-size="9" class="text-dim">BM (mid)</text>

  <!-- Cell 2: long line (+) then short line (-) -->
  <line x1="45" y1="115" x2="75" y2="115" stroke-width="3" class="wire-pwr"/>
  <line x1="50" y1="125" x2="70" y2="125" stroke-width="1.5" class="wire"/>

  <!-- Bottom wire (GND) -->
  <line x1="60" y1="125" x2="60" y2="145" class="wire-gnd"/>
  <text x="45" y="143" text-anchor="end" font-size="10" font-weight="bold" class="text">-</text>

  <!-- Battery labels -->
  <text x="60" y="60" text-anchor="middle" font-size="11" font-weight="bold" class="text">V_bat</text>
  <text x="20" y="108" text-anchor="middle" font-size="9" class="text-dim" transform="rotate(-90,20,108)">7.4V nom</text>

  <!-- ==================== BMS BLOCK ==================== -->
  <rect x="155" y="55" width="100" height="105" rx="4" class="comp-bms"/>
  <text x="205" y="100" text-anchor="middle" font-size="12" font-weight="bold" class="text">BMS</text>
  <text x="205" y="116" text-anchor="middle" font-size="9" class="text-dim">2S</text>

  <!-- BMS input labels (left) -->
  <text x="161" y="78" font-size="9" class="text">B+</text>
  <text x="161" y="108" font-size="9" class="text">BM</text>
  <text x="161" y="148" font-size="9" class="text">B-</text>

  <!-- BMS output labels (right) -->
  <text x="235" y="78" font-size="9" class="text">P+</text>
  <text x="235" y="148" font-size="9" class="text">P-</text>

  <!-- Wires: Battery to BMS -->
  <!-- B+ -->
  <line x1="60" y1="70" x2="130" y2="70" class="wire-pwr"/>
  <line x1="130" y1="70" x2="130" y2="75" class="wire-pwr"/>
  <line x1="130" y1="75" x2="155" y2="75" class="wire-pwr"/>

  <!-- BM -->
  <line x1="85" y1="108" x2="130" y2="108" class="wire"/>
  <line x1="130" y1="105" x2="155" y2="105" class="wire"/>
  <line x1="130" y1="105" x2="130" y2="108" class="wire"/>

  <!-- B- -->
  <line x1="60" y1="145" x2="130" y2="145" class="wire-gnd"/>
  <line x1="130" y1="145" x2="155" y2="145" class="wire-gnd"/>

  <!-- BMS outputs -->
  <!-- P+ -->
  <line x1="255" y1="75" x2="310" y2="75" class="wire-pwr"/>
  <text x="283" y="65" text-anchor="middle" font-size="10" font-weight="bold" class="text">6.0-8.4V</text>

  <!-- P- -->
  <line x1="255" y1="145" x2="310" y2="145" class="wire-gnd"/>

  <!-- ==================== VOLTAGE DIVIDER ==================== -->
  <!-- Junction from P+ going down -->
  <circle cx="310" cy="75" r="3" class="wire-pwr" fill="currentColor"/>
  <line x1="310" y1="75" x2="310" y2="115" class="wire-pwr"/>

  <!-- R1 zigzag (150k) -->
  <polyline points="310,115 303,121 317,127 303,133 317,139 303,145 317,151 303,157 310,163" class="comp" fill="none"/>
  <text x="325" y="136" font-size="10" font-weight="bold" class="text">R1</text>
  <text x="325" y="150" font-size="9" class="text-dim">150k</text>

  <!-- Wire from R1 to junction node -->
  <line x1="310" y1="163" x2="310" y2="185" class="wire"/>

  <!-- Junction node (signal tap) -->
  <circle cx="310" cy="185" r="4" fill="#a29bfe"/>

  <!-- Wire from junction to R2 -->
  <line x1="310" y1="185" x2="310" y2="207" class="wire"/>

  <!-- R2 zigzag (100k) -->
  <polyline points="310,207 303,213 317,219 303,225 317,231 303,237 317,243 303,249 310,255" class="comp" fill="none"/>
  <text x="325" y="228" font-size="10" font-weight="bold" class="text">R2</text>
  <text x="325" y="242" font-size="9" class="text-dim">100k</text>

  <!-- Wire from R2 to GND -->
  <line x1="310" y1="255" x2="310" y2="290" class="wire-gnd"/>

  <!-- GND rail -->
  <line x1="255" y1="145" x2="255" y2="290" class="wire-gnd"/>
  <line x1="255" y1="290" x2="310" y2="290" class="wire-gnd"/>

  <!-- GND symbol under divider -->
  <line x1="283" y1="290" x2="283" y2="310" class="wire-gnd"/>
  <line x1="268" y1="310" x2="298" y2="310" stroke-width="2" class="wire-gnd"/>
  <line x1="272" y1="316" x2="294" y2="316" stroke-width="1.5" class="wire-gnd"/>
  <line x1="276" y1="322" x2="290" y2="322" stroke-width="1" class="wire-gnd"/>

  <!-- Voltage annotation at junction -->
  <rect x="345" y="176" width="95" height="20" rx="4" class="legend-bg"/>
  <text x="392" y="190" text-anchor="middle" font-size="9" class="text">2.40 - 3.36V</text>

  <!-- ==================== SIGNAL WIRE TO ESP8266 ==================== -->
  <line x1="310" y1="185" x2="440" y2="185" class="wire-sig"/>
  <line x1="440" y1="185" x2="510" y2="185" class="wire-sig"/>

  <!-- ==================== BUCK CONVERTER BLOCK ==================== -->
  <!-- P+ continues to buck input -->
  <line x1="310" y1="75" x2="510" y2="75" class="wire-pwr"/>

  <!-- P- continues to buck input -->
  <line x1="310" y1="290" x2="460" y2="290" class="wire-gnd"/>
  <line x1="460" y1="290" x2="460" y2="250" class="wire-gnd"/>
  <line x1="460" y1="250" x2="510" y2="250" class="wire-gnd"/>

  <rect x="510" y="55" width="120" height="215" rx="4" class="comp-buck"/>
  <text x="570" y="150" text-anchor="middle" font-size="12" font-weight="bold" class="text">MP1584</text>
  <text x="570" y="168" text-anchor="middle" font-size="9" class="text-dim">Buck</text>
  <text x="570" y="183" text-anchor="middle" font-size="9" class="text-dim">Converter</text>

  <!-- Buck labels -->
  <text x="516" y="78" font-size="9" class="text">IN+</text>
  <text x="516" y="253" font-size="9" class="text">IN-</text>
  <text x="608" y="78" font-size="9" class="text">OUT+</text>
  <text x="608" y="253" font-size="9" class="text">OUT-</text>

  <!-- Buck outputs -->
  <line x1="630" y1="75" x2="700" y2="75" class="wire-pwr"/>
  <line x1="630" y1="250" x2="700" y2="250" class="wire-gnd"/>
  <text x="665" y="65" text-anchor="middle" font-size="11" font-weight="bold" class="text">5.0V</text>

  <!-- ==================== CAPACITOR C1 ==================== -->
  <line x1="700" y1="75" x2="700" y2="140" class="wire-pwr"/>
  <!-- Cap plates -->
  <line x1="690" y1="140" x2="710" y2="140" stroke-width="3" class="wire"/>
  <line x1="690" y1="148" x2="710" y2="148" stroke-width="3" class="wire"/>
  <text x="716" y="138" font-size="9" font-weight="bold" fill="#e74c3c">+</text>
  <line x1="700" y1="148" x2="700" y2="250" class="wire-gnd"/>
  <circle cx="700" cy="250" r="3" class="wire-gnd" fill="currentColor"/>
  <text x="718" y="150" font-size="10" font-weight="bold" class="text">C1</text>
  <text x="718" y="164" font-size="9" class="text-dim">100uF</text>

  <!-- Continue 5V to ESP block -->
  <line x1="700" y1="75" x2="775" y2="75" class="wire-pwr"/>
  <circle cx="700" cy="75" r="3" class="wire-pwr" fill="currentColor"/>

  <!-- Continue GND to ESP block -->
  <line x1="700" y1="250" x2="775" y2="250" class="wire-gnd"/>

  <!-- ==================== ESP8266 MCU BLOCK ==================== -->
  <rect x="775" y="55" width="55" height="215" rx="4" class="comp-mcu"/>
  <text x="802" y="130" text-anchor="middle" font-size="10" font-weight="bold" class="text" transform="rotate(-90,802,130)">ESP8266</text>

  <!-- ESP pin labels -->
  <text x="768" y="78" text-anchor="end" font-size="9" class="text">5V</text>
  <text x="768" y="188" text-anchor="end" font-size="9" class="text">A0</text>
  <text x="768" y="253" text-anchor="end" font-size="9" class="text">GND</text>

  <!-- Signal wire enters A0 -->
  <line x1="510" y1="185" x2="775" y2="185" class="wire-sig"/>

  <!-- ==================== GND SYMBOL at ESP ==================== -->
  <line x1="775" y1="250" x2="775" y2="290" class="wire-gnd"/>
  <line x1="763" y1="290" x2="787" y2="290" stroke-width="2" class="wire-gnd"/>
  <line x1="767" y1="296" x2="783" y2="296" stroke-width="1.5" class="wire-gnd"/>
  <line x1="771" y1="302" x2="779" y2="302" stroke-width="1" class="wire-gnd"/>

  <!-- ==================== FORMULA BOX ==================== -->
  <rect x="470" y="330" width="360" height="55" rx="4" class="legend-bg"/>
  <text x="650" y="350" text-anchor="middle" font-size="11" font-weight="bold" class="text">Divider Formula</text>
  <text x="650" y="366" text-anchor="middle" font-size="10" class="text">V_A0 = V_bat x R2 / (R1 + R2)</text>
  <text x="650" y="380" text-anchor="middle" font-size="10" class="text">V_A0 = V_bat x 100k / 250k = V_bat x 0.4</text>

  <!-- ==================== SoC BOX ==================== -->
  <rect x="470" y="285" width="130" height="35" rx="4" class="legend-bg"/>
  <text x="535" y="300" text-anchor="middle" font-size="10" font-weight="bold" class="text">SoC Mapping</text>
  <text x="535" y="314" text-anchor="middle" font-size="9" class="text-dim">8.4V=100%  6.0V=0%</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="20" y="350" width="410" height="80" rx="4" class="legend-bg"/>
  <text x="32" y="370" font-size="10" font-weight="bold" class="text">Legend</text>
  <line x1="32" y1="385" x2="55" y2="385" class="wire-pwr" stroke-width="2"/>
  <text x="60" y="389" font-size="9" class="text">V+ (power)</text>
  <line x1="140" y1="385" x2="163" y2="385" class="wire-gnd" stroke-width="2"/>
  <text x="168" y="389" font-size="9" class="text">GND</text>
  <line x1="210" y1="385" x2="233" y2="385" class="wire-sig" stroke-width="2"/>
  <text x="238" y="389" font-size="9" class="text">Signal (ADC)</text>

  <!-- Resistor symbol in legend -->
  <polyline points="32,405 29,408 35,411 29,414 35,417 32,420" class="comp" fill="none"/>
  <text x="42" y="416" font-size="9" class="text">Resistor</text>

  <!-- Capacitor symbol in legend -->
  <line x1="110" y1="407" x2="110" y2="413" stroke-width="3" class="wire"/>
  <line x1="110" y1="416" x2="110" y2="422" stroke-width="3" class="wire"/>
  <text x="120" y="418" font-size="9" class="text">Capacitor</text>

  <!-- Ground symbol in legend -->
  <line x1="210" y1="405" x2="210" y2="412" class="wire-gnd"/>
  <line x1="204" y1="412" x2="216" y2="412" stroke-width="2" class="wire-gnd"/>
  <line x1="206" y1="416" x2="214" y2="416" stroke-width="1.5" class="wire-gnd"/>
  <line x1="208" y1="420" x2="212" y2="420" stroke-width="1" class="wire-gnd"/>
  <text x="222" y="416" font-size="9" class="text">Ground</text>
</svg>
