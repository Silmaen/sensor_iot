<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="700" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="400" y="25" text-anchor="middle">One-Shot Deep Sleep Mode</text>

  <!-- ===== setup() block ===== -->
  <rect class="box-mcu" x="100" y="42" width="550" height="540" rx="4"/>
  <text class="text" x="120" y="64" font-weight="bold">setup()</text>
  <text class="text-dim" x="220" y="64">(runs once per wake cycle)</text>

  <!-- Tree trunk -->
  <line class="wire" x1="140" y1="78" x2="140" y2="548"/>

  <!-- Step 1: register_modules() -->
  <line class="wire" x1="140" y1="94" x2="160" y2="94"/>
  <rect class="box" x="170" y="78" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="99" text-anchor="middle">register_modules()</text>

  <!-- Step 2: read RTC-stored interval -->
  <line class="wire" x1="140" y1="134" x2="160" y2="134"/>
  <rect class="box" x="170" y="118" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="139" text-anchor="middle">read RTC-stored interval</text>

  <!-- Step 3: init + read sensor -->
  <line class="wire" x1="140" y1="174" x2="160" y2="174"/>
  <rect class="box-sensor" x="170" y="158" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="179" text-anchor="middle">init + read sensor</text>

  <!-- Step 4: connect WiFi + MQTT -->
  <line class="wire" x1="140" y1="214" x2="160" y2="214"/>
  <rect class="box" x="170" y="198" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="219" text-anchor="middle">connect WiFi + MQTT</text>

  <!-- Step 5: subscribe to command topic -->
  <line class="wire" x1="140" y1="254" x2="160" y2="254"/>
  <rect class="box" x="170" y="238" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="259" text-anchor="middle">subscribe to command topic</text>

  <!-- Step 6: wait for retained commands -->
  <line class="wire" x1="140" y1="294" x2="160" y2="294"/>
  <rect class="box" x="170" y="278" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="299" text-anchor="middle">wait &lt;=2s for retained commands</text>

  <!-- Step 7: publish_sensor_data() -->
  <line class="wire" x1="140" y1="334" x2="160" y2="334"/>
  <rect class="box-lib" x="170" y="318" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="339" text-anchor="middle">publish_sensor_data()</text>

  <!-- Step 8: publish battery alert -->
  <line class="wire" x1="140" y1="374" x2="160" y2="374"/>
  <rect class="box-lib" x="170" y="358" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="379" text-anchor="middle">publish battery alert  (if low)</text>

  <!-- Step 9: disconnect -->
  <line class="wire" x1="140" y1="414" x2="160" y2="414"/>
  <rect class="box" x="170" y="398" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="419" text-anchor="middle">disconnect</text>

  <!-- Step 10: deep_sleep(interval) -->
  <line class="wire" x1="140" y1="454" x2="160" y2="454"/>
  <rect class="box-sensor" x="170" y="438" width="450" height="32" rx="4"/>
  <text class="text" x="395" y="459" text-anchor="middle">deep_sleep(interval)</text>

  <!-- RST label between deep_sleep and loop-back -->
  <text class="text" x="395" y="495" text-anchor="middle" font-weight="bold">RST</text>

  <!-- Arrow down from deep_sleep -->
  <line class="wire" x1="395" y1="470" x2="395" y2="485"/>
  <polygon class="arrow" points="395,490 389,482 401,482"/>

  <!-- Loop-back arrow from RST back to setup() top -->
  <path class="wire-pwr" d="M 395,500 L 395,530 Q 395,548 375,548 L 70,548 Q 55,548 55,530 L 55,56 Q 55,42 70,42 L 95,42"/>
  <polygon class="arrow" points="100,42 92,36 92,48" style="fill:#ff6b6b"/>
  <text class="text-dim" x="42" y="300" text-anchor="middle" font-size="10" transform="rotate(-90,42,300)">wake from deep sleep</text>

  <!-- ===== loop() block (never reached) ===== -->
  <rect class="box" x="100" y="600" width="550" height="40" rx="4" style="opacity:0.4"/>
  <text class="text-dim" x="375" y="625" text-anchor="middle">loop()  (never reached)</text>

  <!-- Legend -->
  <rect class="legend-bg" x="100" y="660" width="550" height="30" rx="4"/>
  <rect class="box-mcu" x="115" y="668" width="12" height="12" rx="2"/>
  <text class="text-dim" x="132" y="679" font-size="10">Phase</text>
  <rect class="box-sensor" x="200" y="668" width="12" height="12" rx="2"/>
  <text class="text-dim" x="217" y="679" font-size="10">Hardware</text>
  <rect class="box" x="300" y="668" width="12" height="12" rx="2"/>
  <text class="text-dim" x="317" y="679" font-size="10">MQTT / Core</text>
  <rect class="box-lib" x="420" y="668" width="12" height="12" rx="2"/>
  <text class="text-dim" x="437" y="679" font-size="10">Publish</text>
  <line class="wire-pwr" x1="510" y1="674" x2="540" y2="674"/>
  <text class="text-dim" x="548" y="679" font-size="10">RST loop</text>
</svg>
