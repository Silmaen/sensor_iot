<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="monospace" font-size="12">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a2e; }
        .text { fill: #e0e0e0; }
        .text-dim { fill: #999; }
        .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
        .wire-i2c { stroke: #fdcb6e; stroke-width: 1.5; fill: none; }
        .wire-ctrl { stroke: #55efc4; stroke-width: 1.5; fill: none; }
        .comp { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; }
        .comp-bms { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; }
        .comp-ldo { fill: #3a3a2e; stroke: #8a8a5e; stroke-width: 1.5; }
        .comp-cell { fill: #3e3a2a; stroke: #8e8a5a; stroke-width: 1.5; }
        .comp-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; }
        .comp-sensor { fill: #3e2a4e; stroke: #7e5a9e; stroke-width: 1.5; }
        .comp-mosfet { fill: #2e3a2e; stroke: #6a9a6a; stroke-width: 1.5; }
        .legend-bg { fill: #22223a; stroke: #444; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .text { fill: #333; }
        .text-dim { fill: #999; }
        .wire { stroke: #333; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
        .wire-i2c { stroke: #f39c12; stroke-width: 1.5; fill: none; }
        .wire-ctrl { stroke: #00b894; stroke-width: 1.5; fill: none; }
        .comp { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; }
        .comp-bms { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; }
        .comp-ldo { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
        .comp-cell { fill: #fef9e7; stroke: #d4ac0d; stroke-width: 1.5; }
        .comp-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; }
        .comp-sensor { fill: #f4ecf7; stroke: #8e44ad; stroke-width: 1.5; }
        .comp-mosfet { fill: #e8f8f5; stroke: #1abc9c; stroke-width: 1.5; }
        .legend-bg { fill: #f8f9fa; stroke: #ddd; }
      }
    </style>
  </defs>

  <rect width="900" height="650" class="bg" rx="4"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" class="text">ESP32-C3 + BME280 + BH1750 + 2S Battery — Wiring Diagram</text>

  <!-- ==================== 2S BATTERY PACK ==================== -->
  <text x="75" y="60" text-anchor="middle" font-size="11" font-weight="bold" class="text">2S 18650 Pack</text>
  <rect x="25" y="70" width="100" height="55" rx="4" class="comp-cell"/>
  <text x="75" y="93" text-anchor="middle" font-size="10" font-weight="bold" class="text">Cell #1</text>
  <text x="75" y="107" text-anchor="middle" font-size="8" class="text-dim">3.7V</text>
  <line x1="75" y1="125" x2="75" y2="140" class="wire"/>
  <rect x="25" y="140" width="100" height="55" rx="4" class="comp-cell"/>
  <text x="75" y="163" text-anchor="middle" font-size="10" font-weight="bold" class="text">Cell #2</text>
  <text x="75" y="177" text-anchor="middle" font-size="8" class="text-dim">3.7V</text>

  <!-- ==================== BMS ==================== -->
  <rect x="170" y="75" width="90" height="115" rx="4" class="comp-bms"/>
  <text x="215" y="125" text-anchor="middle" font-size="11" font-weight="bold" class="text">BMS</text>
  <text x="215" y="140" text-anchor="middle" font-size="9" class="text-dim">2S</text>
  <text x="178" y="98" font-size="8" class="text">B+</text>
  <text x="178" y="132" font-size="8" class="text">BM</text>
  <text x="178" y="170" font-size="8" class="text">B-</text>
  <text x="242" y="98" font-size="8" class="text">P+</text>
  <text x="242" y="170" font-size="8" class="text">P-</text>

  <!-- Battery to BMS wires -->
  <line x1="125" y1="85" x2="170" y2="93" class="wire-pwr"/>
  <line x1="75" y1="132" x2="170" y2="128" class="wire"/>
  <line x1="25" y1="160" x2="15" y2="160" class="wire-gnd"/>
  <line x1="15" y1="160" x2="15" y2="190" class="wire-gnd"/>
  <line x1="15" y1="190" x2="170" y2="166" class="wire-gnd"/>

  <!-- BMS outputs -->
  <line x1="260" y1="93" x2="310" y2="93" class="wire-pwr"/>
  <line x1="260" y1="166" x2="310" y2="166" class="wire-gnd"/>
  <text x="285" y="83" text-anchor="middle" font-size="9" class="text-dim">6.0-8.4V</text>

  <!-- ==================== HT7333 LDO ==================== -->
  <rect x="310" y="73" width="100" height="60" rx="4" class="comp-ldo"/>
  <text x="360" y="98" text-anchor="middle" font-size="11" font-weight="bold" class="text">HT7333</text>
  <text x="360" y="115" text-anchor="middle" font-size="9" class="text-dim">3.3V LDO</text>
  <text x="316" y="92" font-size="8" class="text">IN</text>
  <text x="393" y="92" font-size="8" class="text">OUT</text>
  <text x="360" y="128" text-anchor="middle" font-size="8" class="text-dim">GND</text>
  <line x1="360" y1="133" x2="360" y2="166" class="wire-gnd"/>
  <line x1="310" y1="166" x2="360" y2="166" class="wire-gnd"/>

  <!-- LDO output -->
  <line x1="410" y1="88" x2="460" y2="88" class="wire-pwr"/>
  <text x="435" y="78" text-anchor="middle" font-size="10" font-weight="bold" class="text">3.3V</text>

  <!-- 100nF decoupling caps -->
  <line x1="460" y1="88" x2="460" y2="100" class="wire-pwr"/>
  <line x1="453" y1="100" x2="467" y2="100" stroke-width="2.5" class="wire"/>
  <line x1="453" y1="106" x2="467" y2="106" stroke-width="2.5" class="wire"/>
  <line x1="460" y1="106" x2="460" y2="166" class="wire-gnd"/>
  <text x="475" y="106" font-size="8" class="text-dim">100nF</text>

  <!-- GND rail -->
  <line x1="360" y1="166" x2="460" y2="166" class="wire-gnd"/>

  <!-- ==================== VOLTAGE DIVIDER + MOSFET ==================== -->
  <!-- Branch from BMS P+ -->
  <circle cx="310" cy="93" r="3" class="wire-pwr" fill="currentColor"/>
  <line x1="310" y1="93" x2="310" y2="230" class="wire-pwr"/>

  <!-- R1 -->
  <rect x="297" y="230" width="26" height="50" rx="3" class="comp"/>
  <text x="310" y="253" text-anchor="middle" font-size="8" class="text">R1</text>
  <text x="310" y="266" text-anchor="middle" font-size="7" class="text-dim">22k</text>

  <!-- Mid-point -->
  <line x1="310" y1="280" x2="310" y2="300" class="wire"/>
  <circle cx="310" cy="300" r="3" fill="#a29bfe"/>

  <!-- R2 -->
  <line x1="310" y1="300" x2="310" y2="320" class="wire"/>
  <rect x="297" y="320" width="26" height="50" rx="3" class="comp"/>
  <text x="310" y="343" text-anchor="middle" font-size="8" class="text">R2</text>
  <text x="310" y="356" text-anchor="middle" font-size="7" class="text-dim">12k</text>

  <!-- MOSFET -->
  <line x1="310" y1="370" x2="310" y2="390" class="wire"/>
  <rect x="295" y="390" width="30" height="30" rx="3" class="comp-mosfet"/>
  <text x="310" y="408" text-anchor="middle" font-size="8" font-weight="bold" class="text">Q1</text>
  <text x="335" y="408" font-size="7" class="text-dim">2N7000</text>

  <!-- MOSFET to GND -->
  <line x1="310" y1="420" x2="310" y2="440" class="wire-gnd"/>
  <line x1="310" y1="440" x2="460" y2="440" class="wire-gnd"/>
  <circle cx="460" cy="166" r="3" class="wire-gnd" fill="currentColor"/>
  <line x1="460" y1="166" x2="460" y2="440" class="wire-gnd"/>

  <!-- Signal wire MID → GPIO3 -->
  <line x1="310" y1="300" x2="350" y2="300" class="wire-sig"/>
  <line x1="350" y1="300" x2="515" y2="300" class="wire-sig"/>
  <text x="350" y="292" font-size="8" class="text-dim">ADC</text>

  <!-- Gate wire GPIO5 → Q1 -->
  <line x1="295" y1="405" x2="260" y2="405" class="wire-ctrl"/>
  <line x1="260" y1="405" x2="260" y2="350" class="wire-ctrl"/>
  <line x1="260" y1="350" x2="515" y2="350" class="wire-ctrl"/>

  <!-- ==================== ESP32-C3 SUPER MINI ==================== -->
  <rect x="515" y="60" width="220" height="400" rx="4" class="comp-mcu"/>
  <text x="625" y="90" text-anchor="middle" font-size="14" font-weight="bold" class="text">ESP32-C3</text>
  <text x="625" y="108" text-anchor="middle" font-size="10" class="text-dim">Super Mini</text>

  <!-- Left side pins -->
  <rect x="521" y="140" width="50" height="18" rx="3" fill="#c0392b" stroke="none"/>
  <text x="546" y="153" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">3V3</text>

  <rect x="521" y="170" width="50" height="18" rx="3" fill="#2c3e50" stroke="none"/>
  <text x="546" y="183" text-anchor="middle" font-size="9" font-weight="bold" fill="#74b9ff">GND</text>

  <rect x="521" y="220" width="50" height="18" rx="3" fill="#f39c12" stroke="none"/>
  <text x="546" y="233" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">GPIO6</text>
  <text x="577" y="233" font-size="8" class="text-dim">SDA</text>

  <rect x="521" y="250" width="50" height="18" rx="3" fill="#f39c12" stroke="none"/>
  <text x="546" y="263" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">GPIO7</text>
  <text x="577" y="263" font-size="8" class="text-dim">SCL</text>

  <rect x="521" y="290" width="50" height="18" rx="3" fill="#a29bfe" stroke="none"/>
  <text x="546" y="303" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">GPIO3</text>
  <text x="577" y="303" font-size="8" class="text-dim">ADC</text>

  <rect x="521" y="340" width="50" height="18" rx="3" fill="#00b894" stroke="none"/>
  <text x="546" y="353" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">GPIO5</text>
  <text x="577" y="353" font-size="8" class="text-dim">SW</text>

  <!-- USB-C -->
  <rect x="605" y="435" width="40" height="16" rx="3" fill="#555" stroke="#777"/>
  <text x="625" y="447" text-anchor="middle" font-size="7" fill="#ddd">USB-C</text>

  <!-- ==================== POWER WIRES TO MCU ==================== -->
  <!-- 3.3V to MCU -->
  <line x1="460" y1="88" x2="490" y2="88" class="wire-pwr"/>
  <circle cx="460" cy="88" r="3" class="wire-pwr" fill="currentColor"/>
  <line x1="490" y1="88" x2="490" y2="149" class="wire-pwr"/>
  <line x1="490" y1="149" x2="521" y2="149" class="wire-pwr"/>

  <!-- GND to MCU -->
  <line x1="460" y1="166" x2="500" y2="166" class="wire-gnd"/>
  <line x1="500" y1="166" x2="500" y2="179" class="wire-gnd"/>
  <line x1="500" y1="179" x2="521" y2="179" class="wire-gnd"/>

  <!-- ==================== I2C SENSORS ==================== -->
  <!-- BME280 -->
  <rect x="770" y="160" width="110" height="80" rx="4" class="comp-sensor"/>
  <text x="825" y="190" text-anchor="middle" font-size="11" font-weight="bold" class="text">BME280</text>
  <text x="825" y="207" text-anchor="middle" font-size="8" class="text-dim">T/H/P (0x76)</text>
  <text x="825" y="222" text-anchor="middle" font-size="8" class="text-dim">I2C</text>

  <!-- BH1750 -->
  <rect x="770" y="270" width="110" height="80" rx="4" class="comp-sensor"/>
  <text x="825" y="300" text-anchor="middle" font-size="11" font-weight="bold" class="text">BH1750</text>
  <text x="825" y="317" text-anchor="middle" font-size="8" class="text-dim">Lux (0x23)</text>
  <text x="825" y="332" text-anchor="middle" font-size="8" class="text-dim">I2C</text>

  <!-- I2C bus (SDA) -->
  <line x1="571" y1="229" x2="750" y2="229" class="wire-i2c"/>
  <line x1="750" y1="190" x2="750" y2="310" class="wire-i2c"/>
  <line x1="750" y1="190" x2="770" y2="190" class="wire-i2c"/>
  <line x1="750" y1="310" x2="770" y2="310" class="wire-i2c"/>
  <text x="752" y="250" font-size="8" class="text-dim">SDA</text>

  <!-- I2C bus (SCL) -->
  <line x1="571" y1="259" x2="760" y2="259" class="wire-i2c"/>
  <line x1="760" y1="200" x2="760" y2="320" class="wire-i2c"/>
  <line x1="760" y1="200" x2="770" y2="200" class="wire-i2c"/>
  <line x1="760" y1="320" x2="770" y2="320" class="wire-i2c"/>
  <text x="762" y="270" font-size="8" class="text-dim">SCL</text>

  <!-- Sensor power (3.3V) -->
  <line x1="490" y1="88" x2="490" y2="50" class="wire-pwr"/>
  <line x1="490" y1="50" x2="850" y2="50" class="wire-pwr"/>
  <line x1="850" y1="50" x2="850" y2="160" class="wire-pwr"/>
  <line x1="850" y1="160" x2="850" y2="270" class="wire-pwr"/>
  <text x="855" y="168" font-size="7" class="text-dim">VCC</text>
  <text x="855" y="278" font-size="7" class="text-dim">VCC</text>

  <!-- Sensor GND -->
  <line x1="840" y1="240" x2="840" y2="350" class="wire-gnd"/>
  <line x1="840" y1="240" x2="880" y2="240" class="wire-gnd"/>
  <line x1="840" y1="350" x2="880" y2="350" class="wire-gnd"/>
  <line x1="840" y1="440" x2="460" y2="440" class="wire-gnd"/>
  <line x1="840" y1="350" x2="840" y2="440" class="wire-gnd"/>
  <text x="883" y="244" font-size="7" class="text-dim">GND</text>
  <text x="883" y="354" font-size="7" class="text-dim">GND</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="25" y="480" width="850" height="65" rx="4" class="legend-bg"/>
  <text x="40" y="500" font-size="10" font-weight="bold" class="text">Legend:</text>
  <line x1="40" y1="520" x2="60" y2="520" class="wire-pwr" stroke-width="2"/>
  <text x="65" y="524" font-size="9" class="text">3.3V power</text>
  <line x1="150" y1="520" x2="170" y2="520" class="wire-gnd" stroke-width="2"/>
  <text x="175" y="524" font-size="9" class="text">GND</text>
  <line x1="220" y1="520" x2="240" y2="520" class="wire-i2c" stroke-width="2"/>
  <text x="245" y="524" font-size="9" class="text">I2C (SDA/SCL)</text>
  <line x1="350" y1="520" x2="370" y2="520" class="wire-sig" stroke-width="2"/>
  <text x="375" y="524" font-size="9" class="text">ADC signal</text>
  <line x1="460" y1="520" x2="480" y2="520" class="wire-ctrl" stroke-width="2"/>
  <text x="485" y="524" font-size="9" class="text">MOSFET gate</text>

  <!-- Power budget -->
  <text x="40" y="538" font-size="9" class="text-dim">Deep sleep: ~9µA (5µA MCU + 4µA LDO) | Active: ~80mA (WiFi TX) | I2C sensors: ~0.2mA</text>

  <!-- Info box -->
  <rect x="25" y="560" width="850" height="75" rx="4" class="legend-bg"/>
  <text x="450" y="580" text-anchor="middle" font-size="11" font-weight="bold" class="text">Configuration Summary</text>
  <text x="40" y="598" font-size="9" class="text">MCU: ESP32-C3 Super Mini (3.3V native) | Sensors: BME280 (0x76) + BH1750 (0x23) on shared I2C bus</text>
  <text x="40" y="614" font-size="9" class="text">Power: 2S 18650 → BMS 2S → HT7333 (3.3V, 4µA Iq) | Battery ADC: GPIO3 + MOSFET switch (GPIO5)</text>
  <text x="40" y="628" font-size="9" class="text-dim">PlatformIO env: sensor_c3_bme280_bh1750 | Flags: HAS_BME280, HAS_BH1750, HAS_BATTERY, HAS_DEEP_SLEEP, HAS_CALIBRATION</text>
</svg>
