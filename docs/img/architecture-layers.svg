<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" width="860" height="580">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; }
      .box-drv { fill: #4e3a1e; stroke: #ae8a4e; stroke-width: 1.5; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; }
      .legend-bg { fill: #22223a; stroke: #444; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; }
      .box-drv { fill: #fdebd0; stroke: #e67e22; stroke-width: 1.5; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="860" height="580" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="430" y="26" text-anchor="middle">Architecture Layers</text>

  <!-- Layer 1: platformio.ini -->
  <rect class="box" x="150" y="42" width="560" height="50" rx="4"/>
  <text class="text" x="430" y="62" text-anchor="middle" font-weight="bold">platformio.ini</text>
  <text class="text-dim" x="430" y="80" text-anchor="middle">Per-env: MQTT_DEVICE_TYPE, HW_CODE, HW_REV, HAS_xxx flags</text>

  <!-- Arrow down -->
  <line class="wire" x1="430" y1="92" x2="430" y2="112"/>
  <polygon class="arrow" points="430,118 424,110 436,110"/>
  <text class="text-dim" x="444" y="108" font-size="10">-D build flags</text>

  <!-- Layer 2: src/main.cpp -->
  <rect class="box-mcu" x="150" y="120" width="560" height="90" rx="4"/>
  <text class="text" x="430" y="140" text-anchor="middle" font-weight="bold">src/main.cpp -- Core orchestrator</text>
  <text class="text-dim" x="430" y="158" text-anchor="middle">Always: MQTT connect, subscribe, publish, dispatch</text>
  <text class="text-dim" x="430" y="174" text-anchor="middle">#ifdef HAS_xxx: init module / register / contribute</text>
  <text class="text-dim" x="430" y="190" text-anchor="middle">Boot: provision device_id, DeviceTopics::build(), restore calibration</text>

  <!-- Fan-out arrows to the three library groups -->
  <line class="wire" x1="160" y1="210" x2="160" y2="242"/>
  <polygon class="arrow" points="160,248 154,240 166,240"/>
  <line class="wire" x1="430" y1="210" x2="430" y2="242"/>
  <polygon class="arrow" points="430,248 424,240 436,240"/>
  <line class="wire" x1="700" y1="210" x2="700" y2="242"/>
  <polygon class="arrow" points="700,248 694,240 706,240"/>

  <!-- ================= Column A: thermo_platform (per-MCU) ================= -->
  <rect class="box-sensor" x="25" y="248" width="270" height="292" rx="4"/>
  <text class="text" x="160" y="268" text-anchor="middle" font-weight="bold">lib/thermo_platform/ -- per-MCU</text>

  <rect class="box-sensor" x="38" y="280" width="244" height="58" rx="4" style="opacity:0.7"/>
  <text class="text" x="160" y="298" text-anchor="middle" font-weight="bold" font-size="11">ESP8266 (D1 Mini)</text>
  <text class="text-dim" x="160" y="313" text-anchor="middle" font-size="10">esp_network - esp_sleep - esp_ota</text>
  <text class="text-dim" x="160" y="327" text-anchor="middle" font-size="10">littlefs_config_store</text>

  <rect class="box-sensor" x="38" y="346" width="244" height="58" rx="4" style="opacity:0.7"/>
  <text class="text" x="160" y="364" text-anchor="middle" font-weight="bold" font-size="11">ESP32-C3 (Super Mini)</text>
  <text class="text-dim" x="160" y="379" text-anchor="middle" font-size="10">esp32_network - esp32_sleep - esp32_ota</text>
  <text class="text-dim" x="160" y="393" text-anchor="middle" font-size="10">nvs_config_store</text>

  <rect class="box-sensor" x="38" y="412" width="244" height="58" rx="4" style="opacity:0.7"/>
  <text class="text" x="160" y="430" text-anchor="middle" font-weight="bold" font-size="11">SAMD21 (MKR)</text>
  <text class="text-dim" x="160" y="445" text-anchor="middle" font-size="10">nina_network - samd_sleep (RTCZero)</text>
  <text class="text-dim" x="160" y="459" text-anchor="middle" font-size="10">flash_config_store - no OTA</text>

  <text class="text-dim" x="160" y="492" text-anchor="middle" font-size="10">Shared: battery_adc - hw_id</text>

  <!-- ================= Column B: thermo_drivers (cross-platform) ================= -->
  <rect class="box-drv" x="305" y="248" width="250" height="292" rx="4"/>
  <text class="text" x="430" y="268" text-anchor="middle" font-weight="bold">lib/thermo_drivers/</text>

  <rect class="box-drv" x="318" y="298" width="224" height="152" rx="4" style="opacity:0.7"/>
  <text class="text" x="430" y="318" text-anchor="middle" font-weight="bold" font-size="11">sensor drivers (HAS_xxx)</text>
  <text class="text-dim" x="430" y="342" text-anchor="middle" font-size="10">bme280_sensor</text>
  <text class="text-dim" x="430" y="364" text-anchor="middle" font-size="10">sht30_sensor</text>
  <text class="text-dim" x="430" y="386" text-anchor="middle" font-size="10">bh1750_sensor</text>
  <text class="text-dim" x="430" y="408" text-anchor="middle" font-size="10">mkr_env_sensor</text>
  <text class="text-dim" x="430" y="430" text-anchor="middle" font-size="10">shift_display</text>

  <text class="text-dim" x="430" y="480" text-anchor="middle" font-size="10">Arduino, cross-platform</text>
  <text class="text-dim" x="430" y="496" text-anchor="middle" font-size="10">(I2C / SPI / analog)</text>

  <!-- ================= Column C: thermo_core (portable) ================= -->
  <rect class="box-lib" x="565" y="248" width="270" height="292" rx="4"/>
  <text class="text" x="700" y="268" text-anchor="middle" font-weight="bold">lib/thermo_core/ -- portable, tested</text>

  <rect class="box-lib" x="578" y="280" width="244" height="46" rx="4" style="opacity:0.7"/>
  <text class="text" x="700" y="298" text-anchor="middle" font-weight="bold" font-size="11">ModuleRegistry</text>
  <text class="text-dim" x="700" y="313" text-anchor="middle" font-size="10">metrics/commands/handlers, dispatch()</text>

  <rect class="box-lib" x="578" y="334" width="244" height="44" rx="4" style="opacity:0.7"/>
  <text class="text" x="700" y="352" text-anchor="middle" font-weight="bold" font-size="11">PayloadBuilder</text>
  <text class="text-dim" x="700" y="366" text-anchor="middle" font-size="10">incremental JSON (snprintf)</text>

  <rect class="box-lib" x="578" y="386" width="244" height="62" rx="4" style="opacity:0.7"/>
  <text class="text" x="700" y="403" text-anchor="middle" font-weight="bold" font-size="11">modules/</text>
  <text class="text-dim" x="700" y="417" text-anchor="middle" font-size="10">bme280 sht30 bh1750 mkr_env battery</text>
  <text class="text-dim" x="700" y="431" text-anchor="middle" font-size="10">light relay calibration ota</text>

  <text class="text-dim" x="700" y="463" text-anchor="middle" font-size="10">device_topics - config_store (IConfigStore)</text>
  <text class="text-dim" x="700" y="479" text-anchor="middle" font-size="10">mqtt_payload - battery - display_encoding</text>

  <!-- Legend -->
  <rect class="legend-bg" x="25" y="550" width="810" height="24" rx="4"/>
  <rect class="box-mcu" x="38" y="556" width="12" height="12" rx="2"/>
  <text class="text-dim" x="55" y="566" font-size="10">Orchestrator</text>
  <rect class="box-lib" x="150" y="556" width="12" height="12" rx="2"/>
  <text class="text-dim" x="167" y="566" font-size="10">Portable core</text>
  <rect class="box-drv" x="262" y="556" width="12" height="12" rx="2"/>
  <text class="text-dim" x="279" y="566" font-size="10">Drivers</text>
  <rect class="box-sensor" x="345" y="556" width="12" height="12" rx="2"/>
  <text class="text-dim" x="362" y="566" font-size="10">Platform (per-MCU)</text>
  <rect class="box" x="500" y="556" width="12" height="12" rx="2"/>
  <text class="text-dim" x="517" y="566" font-size="10">Config</text>
  <line class="wire" x1="600" y1="562" x2="630" y2="562"/>
  <polygon class="arrow" points="632,562 626,558 626,566"/>
  <text class="text-dim" x="638" y="566" font-size="10">Data flow</text>
</svg>
