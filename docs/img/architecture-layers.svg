<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="400" y="25" text-anchor="middle">Architecture Layers</text>

  <!-- Layer 1: platformio.ini -->
  <rect class="box" x="120" y="38" width="560" height="48" rx="4"/>
  <text class="text" x="400" y="58" text-anchor="middle" font-weight="bold">platformio.ini</text>
  <text class="text-dim" x="400" y="76" text-anchor="middle">Defines: DEVICE_ID, MQTT_DEVICE_TYPE, HAS_xxx flags</text>

  <!-- Arrow down -->
  <line class="wire" x1="400" y1="86" x2="400" y2="108"/>
  <polygon class="arrow" points="400,114 394,106 406,106"/>
  <text class="text-dim" x="414" y="104" font-size="10">-D build flags</text>

  <!-- Layer 2: src/main.cpp -->
  <rect class="box-mcu" x="120" y="116" width="560" height="90" rx="4"/>
  <text class="text" x="400" y="136" text-anchor="middle" font-weight="bold">src/main.cpp -- Core orchestrator</text>
  <text class="text-dim" x="400" y="154" text-anchor="middle">Always: MQTT connect, subscribe, publish, dispatch</text>
  <text class="text-dim" x="400" y="170" text-anchor="middle">#ifdef HAS_xxx: init module, register, contribute</text>
  <text class="text-dim" x="400" y="186" text-anchor="middle">#ifdef HAS_DEEP_SLEEP: one-shot | #ifndef: continuous loop</text>

  <!-- Arrow down-left to src/hw -->
  <line class="wire" x1="280" y1="206" x2="280" y2="232"/>
  <polygon class="arrow" points="280,238 274,230 286,230"/>

  <!-- Arrow down-right to lib/thermo_core -->
  <line class="wire" x1="520" y1="206" x2="520" y2="232"/>
  <polygon class="arrow" points="520,238 514,230 526,230"/>

  <!-- Layer 3a: src/hw/ (left) -->
  <rect class="box-sensor" x="30" y="240" width="340" height="170" rx="4"/>
  <text class="text" x="200" y="260" text-anchor="middle" font-weight="bold">src/hw/ -- Platform-specific drivers</text>

  <!-- ESP8266 sub-box -->
  <rect class="box-sensor" x="45" y="270" width="145" height="90" rx="4" style="opacity:0.7"/>
  <text class="text" x="118" y="288" text-anchor="middle" font-weight="bold" font-size="11">ESP8266</text>
  <text class="text-dim" x="118" y="304" text-anchor="middle" font-size="10">esp_network</text>
  <text class="text-dim" x="118" y="318" text-anchor="middle" font-size="10">battery_adc</text>
  <text class="text-dim" x="118" y="332" text-anchor="middle" font-size="10">esp_sleep</text>
  <text class="text-dim" x="118" y="346" text-anchor="middle" font-size="10">shift_display</text>

  <!-- SAMD21 sub-box -->
  <rect class="box-sensor" x="205" y="270" width="150" height="90" rx="4" style="opacity:0.7"/>
  <text class="text" x="280" y="288" text-anchor="middle" font-weight="bold" font-size="11">SAMD21 (MKR)</text>
  <text class="text-dim" x="280" y="304" text-anchor="middle" font-size="10">nina_network</text>
  <text class="text-dim" x="280" y="318" text-anchor="middle" font-size="10">samd_battery_adc</text>

  <!-- Shared -->
  <text class="text-dim" x="200" y="382" text-anchor="middle" font-size="10">Shared: bme280_sensor, sht30_sensor</text>

  <!-- Layer 3b: lib/thermo_core/ (right) -->
  <rect class="box-lib" x="395" y="240" width="375" height="210" rx="4"/>
  <text class="text" x="582" y="260" text-anchor="middle" font-weight="bold">lib/thermo_core/ -- Portable library</text>

  <!-- ModuleRegistry box -->
  <rect class="box-lib" x="410" y="270" width="155" height="75" rx="4" style="opacity:0.7"/>
  <text class="text" x="488" y="288" text-anchor="middle" font-weight="bold" font-size="11">ModuleRegistry</text>
  <text class="text-dim" x="488" y="304" text-anchor="middle" font-size="10">metrics[], commands[]</text>
  <text class="text-dim" x="488" y="318" text-anchor="middle" font-size="10">handlers[], dispatch()</text>

  <!-- PayloadBuilder box -->
  <rect class="box-lib" x="580" y="270" width="175" height="75" rx="4" style="opacity:0.7"/>
  <text class="text" x="668" y="288" text-anchor="middle" font-weight="bold" font-size="11">PayloadBuilder</text>
  <text class="text-dim" x="668" y="304" text-anchor="middle" font-size="10">begin / add / end</text>
  <text class="text-dim" x="668" y="318" text-anchor="middle" font-size="10">(snprintf-based)</text>

  <!-- modules/ box -->
  <rect class="box-lib" x="410" y="355" width="345" height="48" rx="4" style="opacity:0.7"/>
  <text class="text" x="582" y="373" text-anchor="middle" font-weight="bold" font-size="11">modules/</text>
  <text class="text-dim" x="582" y="390" text-anchor="middle" font-size="10">bme280_module | sht30_module | battery_module</text>

  <!-- Utilities text -->
  <text class="text-dim" x="582" y="420" text-anchor="middle" font-size="10">mqtt_payload | battery | display_encoding | sensor_data</text>

  <!-- Legend -->
  <rect class="legend-bg" x="30" y="460" width="740" height="30" rx="4"/>
  <rect class="box-mcu" x="45" y="468" width="12" height="12" rx="2"/>
  <text class="text-dim" x="62" y="479" font-size="10">Orchestrator</text>
  <rect class="box-sensor" x="170" y="468" width="12" height="12" rx="2"/>
  <text class="text-dim" x="187" y="479" font-size="10">HW Drivers</text>
  <rect class="box-lib" x="280" y="468" width="12" height="12" rx="2"/>
  <text class="text-dim" x="297" y="479" font-size="10">Portable Library</text>
  <rect class="box" x="415" y="468" width="12" height="12" rx="2"/>
  <text class="text-dim" x="432" y="479" font-size="10">Config</text>
  <line class="wire" x1="510" y1="474" x2="540" y2="474"/>
  <polygon class="arrow" points="542,474 536,470 536,478"/>
  <text class="text-dim" x="548" y="479" font-size="10">Data flow</text>
</svg>