<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="700" height="200" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="350" y="22" text-anchor="middle">Cell Tester -- Discharge Circuit</text>

  <!-- MKR board (left) -->
  <rect class="box-mcu" x="20" y="50" width="130" height="70" rx="4"/>
  <text class="text" x="85" y="72" text-anchor="middle" font-weight="bold">MKR WiFi</text>
  <text class="text" x="85" y="90" text-anchor="middle" font-weight="bold">1010</text>
  <text class="text-dim" x="85" y="110" text-anchor="middle">JST connector</text>

  <!-- Top wire (+ line): MKR JST+ to right, forming top rail -->
  <line class="wire-pwr" x1="150" y1="65" x2="670" y2="65"/>
  <!-- JST + label -->
  <text class="text-dim" x="162" y="58" font-size="10">JST +</text>

  <!-- Bottom wire (- line): MKR JST- to right, forming bottom rail -->
  <line class="wire-gnd" x1="150" y1="105" x2="670" y2="105"/>
  <!-- JST - label -->
  <text class="text-dim" x="162" y="122" font-size="10">JST -</text>

  <!-- Cell (middle, connected between + and - rails) -->
  <rect class="box" x="270" y="55" width="100" height="60" rx="4"/>
  <text class="text" x="320" y="80" text-anchor="middle">18650</text>
  <text class="text-dim" x="320" y="100" text-anchor="middle">cell</text>
  <!-- Vertical wires from cell to rails -->
  <line class="wire-pwr" x1="320" y1="55" x2="320" y2="65"/>
  <line class="wire-gnd" x1="320" y1="115" x2="320" y2="105"/>

  <!-- Switch (right side, top portion) -->
  <rect class="box-sensor" x="460" y="40" width="90" height="35" rx="4"/>
  <text class="text" x="505" y="63" text-anchor="middle">Switch</text>
  <!-- Vertical wire from + rail down to switch -->
  <line class="wire-pwr" x1="505" y1="65" x2="505" y2="75"/>

  <!-- Resistor (right side, bottom portion) -->
  <rect class="box-lib" x="450" y="80" width="110" height="35" rx="4"/>
  <text class="text" x="505" y="103" text-anchor="middle">7.3R 10W</text>
  <!-- Vertical wire from resistor down to - rail -->
  <line class="wire-gnd" x1="505" y1="105" x2="505" y2="115"/>

  <!-- Right side vertical connector (closing the loop) -->
  <line class="wire-pwr" x1="670" y1="65" x2="670" y2="85"/>
  <line class="wire-gnd" x1="670" y1="85" x2="670" y2="105"/>

  <!-- Legend -->
  <rect class="legend-bg" x="20" y="145" width="660" height="45" rx="4"/>
  <line class="wire-pwr" x1="35" y1="162" x2="65" y2="162"/>
  <text class="text-dim" x="70" y="166" font-size="10">+ rail (V+)</text>
  <line class="wire-gnd" x1="195" y1="162" x2="225" y2="162"/>
  <text class="text-dim" x="230" y="166" font-size="10">- rail (GND)</text>
  <text class="text-dim" x="35" y="183" font-size="10">Cell is measured via JST ADC. Switch closes to discharge through 7.3R resistor (~0.5A at 3.7V).</text>
</svg>
