<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text { fill: #e0e0e0; }
      .text-dim { fill: #999; }
      .text-title { fill: #e0e0e0; font-size: 15px; font-weight: bold; }
      .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #55efc4; stroke-width: 1.5; fill: none; }
      .box { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #2e1e4e; stroke: #6e4eae; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #22223a; stroke: #444; rx: 4; }
      .arrow { fill: #ccc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #333; }
      .text-dim { fill: #777; }
      .text-title { fill: #222; font-size: 15px; font-weight: bold; }
      .wire { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
      .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
      .wire-i2c { stroke: #00b894; stroke-width: 1.5; fill: none; }
      .box { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; rx: 4; }
      .box-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; rx: 4; }
      .box-sensor { fill: #e8daef; stroke: #8e44ad; stroke-width: 1.5; rx: 4; }
      .box-lib { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; rx: 4; }
      .legend-bg { fill: #f8f9fa; stroke: #ddd; rx: 4; }
      .arrow { fill: #333; }
    }
    text { font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="700" height="250" rx="4"/>

  <!-- Title -->
  <text class="text-title" x="350" y="22" text-anchor="middle">Cell Tester -- Dual USB Power Supply</text>

  <!-- PC box (top-left) -->
  <rect class="box" x="40" y="40" width="180" height="50" rx="4"/>
  <text class="text" x="130" y="62" text-anchor="middle">PC (laptop/desktop)</text>
  <text class="text-dim" x="130" y="80" text-anchor="middle">serial monitor</text>

  <!-- USB wall charger (top-right) -->
  <rect class="box-lib" x="480" y="40" width="180" height="50" rx="4"/>
  <text class="text" x="570" y="62" text-anchor="middle">USB Wall Charger</text>
  <text class="text-dim" x="570" y="80" text-anchor="middle">&gt;= 1A</text>

  <!-- Wire: PC down to MKR USB-C (data + limited power) -->
  <line class="wire-sig" x1="130" y1="90" x2="130" y2="130"/>
  <line class="wire-sig" x1="130" y1="130" x2="270" y2="130"/>
  <polygon class="arrow" points="270,130 264,125 264,135"/>
  <text class="text-dim" x="140" y="118" font-size="10">USB (data + limited power)</text>

  <!-- Wire: Wall charger down to MKR 5V pin (power only) -->
  <line class="wire-pwr" x1="545" y1="90" x2="545" y2="140"/>
  <line class="wire-pwr" x1="545" y1="140" x2="435" y2="140"/>
  <polygon class="arrow" points="435,140 441,135 441,145"/>
  <text class="text-dim" x="455" y="118" font-size="10">+5V wire</text>

  <!-- Wire: Wall charger GND -->
  <line class="wire-gnd" x1="595" y1="90" x2="595" y2="160"/>
  <line class="wire-gnd" x1="595" y1="160" x2="435" y2="160"/>
  <polygon class="arrow" points="435,160 441,155 441,165"/>
  <text class="text-dim" x="455" y="175" font-size="10">GND wire</text>

  <!-- MKR board (center) -->
  <rect class="box-mcu" x="272" y="115" width="160" height="70" rx="4"/>
  <text class="text" x="352" y="140" text-anchor="middle" font-weight="bold">MKR WiFi 1010</text>
  <text class="text-dim" x="310" y="160" text-anchor="middle">USB-C</text>
  <text class="text-dim" x="400" y="160" text-anchor="middle">5V/GND</text>

  <!-- Legend -->
  <rect class="legend-bg" x="40" y="210" width="620" height="30" rx="4"/>
  <line class="wire-sig" x1="55" y1="225" x2="85" y2="225"/>
  <text class="text-dim" x="90" y="229" font-size="10">USB data + power</text>
  <line class="wire-pwr" x1="260" y1="225" x2="290" y2="225"/>
  <text class="text-dim" x="295" y="229" font-size="10">+5V power</text>
  <line class="wire-gnd" x1="410" y1="225" x2="440" y2="225"/>
  <text class="text-dim" x="445" y="229" font-size="10">GND</text>
</svg>
