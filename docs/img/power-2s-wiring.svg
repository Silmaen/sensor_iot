<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="monospace" font-size="12">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a2e; }
        .text { fill: #e0e0e0; }
        .text-dim { fill: #999; }
        .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
        .comp { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; }
        .comp-bms { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; }
        .comp-buck { fill: #3a3a2e; stroke: #8a8a5e; stroke-width: 1.5; }
        .comp-cap { fill: #4a3a2e; stroke: #9a7a5e; stroke-width: 1.5; }
        .comp-cell { fill: #3e3a2a; stroke: #8e8a5a; stroke-width: 1.5; }
        .comp-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; }
        .legend-bg { fill: #22223a; stroke: #444; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .text { fill: #333; }
        .text-dim { fill: #999; }
        .wire { stroke: #333; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
        .comp { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; }
        .comp-bms { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; }
        .comp-buck { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
        .comp-cap { fill: #fdebd0; stroke: #e67e22; stroke-width: 1.5; }
        .comp-cell { fill: #fef9e7; stroke: #d4ac0d; stroke-width: 1.5; }
        .comp-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; }
        .legend-bg { fill: #f8f9fa; stroke: #ddd; }
      }
    </style>
  </defs>

  <rect width="800" height="550" class="bg" rx="4"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" class="text">2S Power Supply — Wiring Diagram</text>

  <!-- ==================== 2S BATTERY PACK (vertical series) ==================== -->
  <text x="100" y="60" text-anchor="middle" font-size="12" font-weight="bold" class="text">2S 18650 Pack</text>

  <!-- Cell 1 (top): minus at top, plus at bottom -->
  <rect x="40" y="75" width="120" height="70" rx="4" class="comp-cell"/>
  <rect x="160" y="90" width="8" height="40" rx="3" class="comp-cell"/>
  <text x="100" y="100" text-anchor="middle" font-size="11" font-weight="bold" class="text">Cell #1</text>
  <text x="100" y="115" text-anchor="middle" font-size="9" class="text-dim">3.7V nominal</text>
  <text x="52" y="93" font-size="12" font-weight="bold" fill="#3498db">-</text>
  <text x="130" y="140" font-size="12" font-weight="bold" fill="#e74c3c">+</text>

  <!-- Series connection: Cell1+ to Cell2- -->
  <line x1="100" y1="145" x2="100" y2="175" class="wire"/>
  <circle cx="100" cy="160" r="4" fill="#f39c12"/>
  <text x="125" y="164" font-size="10" font-weight="bold" class="text">MID</text>
  <text x="165" y="164" font-size="9" class="text-dim">~3.7V</text>

  <!-- Cell 2 (bottom): minus at top, plus at bottom -->
  <rect x="40" y="175" width="120" height="70" rx="4" class="comp-cell"/>
  <rect x="160" y="190" width="8" height="40" rx="3" class="comp-cell"/>
  <text x="100" y="200" text-anchor="middle" font-size="11" font-weight="bold" class="text">Cell #2</text>
  <text x="100" y="215" text-anchor="middle" font-size="9" class="text-dim">3.7V nominal</text>
  <text x="52" y="193" font-size="12" font-weight="bold" fill="#3498db">-</text>
  <text x="130" y="240" font-size="12" font-weight="bold" fill="#e74c3c">+</text>

  <!-- Total voltage annotation -->
  <text x="100" y="270" text-anchor="middle" font-size="10" class="text-dim">Total: 7.4V nom</text>
  <text x="100" y="284" text-anchor="middle" font-size="9" class="text-dim">6.0V empty / 8.4V full</text>

  <!-- ==================== BMS 2S MODULE ==================== -->
  <rect x="250" y="75" width="160" height="180" rx="4" class="comp-bms"/>
  <text x="330" y="105" text-anchor="middle" font-size="13" font-weight="bold" class="text">BMS 2S</text>
  <text x="330" y="122" text-anchor="middle" font-size="9" class="text-dim">JZK HX-2S</text>
  <text x="330" y="138" text-anchor="middle" font-size="9" class="text-dim">Protection:</text>
  <text x="330" y="152" text-anchor="middle" font-size="9" class="text-dim">overcharge /</text>
  <text x="330" y="166" text-anchor="middle" font-size="9" class="text-dim">overdischarge /</text>
  <text x="330" y="180" text-anchor="middle" font-size="9" class="text-dim">short circuit</text>

  <!-- BMS input pads (left) -->
  <text x="258" y="210" font-size="10" font-weight="bold" class="text">B-</text>
  <text x="258" y="230" font-size="10" font-weight="bold" class="text">BM</text>
  <text x="258" y="250" font-size="10" font-weight="bold" class="text">B+</text>

  <!-- BMS output pads (right) -->
  <text x="383" y="210" font-size="10" font-weight="bold" class="text">P-</text>
  <text x="383" y="250" font-size="10" font-weight="bold" class="text">P+</text>

  <!-- Wire: Cell1 minus (GND, top of pack) to B- -->
  <line x1="40" y1="88" x2="20" y2="88" class="wire-gnd"/>
  <line x1="20" y1="88" x2="20" y2="300" class="wire-gnd"/>
  <line x1="20" y1="300" x2="230" y2="300" class="wire-gnd"/>
  <line x1="230" y1="300" x2="230" y2="207" class="wire-gnd"/>
  <line x1="230" y1="207" x2="250" y2="207" class="wire-gnd"/>

  <!-- Wire: Mid-point to BM -->
  <line x1="100" y1="160" x2="100" y2="175" class="wire"/>
  <line x1="230" y1="227" x2="250" y2="227" class="wire"/>
  <line x1="100" y1="160" x2="215" y2="160" class="wire"/>
  <line x1="215" y1="160" x2="215" y2="227" class="wire"/>
  <line x1="215" y1="227" x2="230" y2="227" class="wire"/>

  <!-- Wire: Cell2 plus (V+, bottom of pack) to B+ -->
  <line x1="168" y1="210" x2="185" y2="210" class="wire-pwr"/>
  <line x1="185" y1="210" x2="185" y2="315" class="wire-pwr"/>
  <line x1="185" y1="315" x2="235" y2="315" class="wire-pwr"/>
  <line x1="235" y1="315" x2="235" y2="247" class="wire-pwr"/>
  <line x1="235" y1="247" x2="250" y2="247" class="wire-pwr"/>

  <!-- BMS P- output -->
  <line x1="410" y1="207" x2="450" y2="207" class="wire-gnd"/>

  <!-- BMS P+ output -->
  <line x1="410" y1="247" x2="450" y2="247" class="wire-pwr"/>
  <text x="430" y="237" text-anchor="middle" font-size="9" class="text-dim">6.0-8.4V</text>

  <!-- ==================== MP1584 BUCK CONVERTER ==================== -->
  <rect x="450" y="185" width="160" height="85" rx="4" class="comp-buck"/>
  <text x="530" y="215" text-anchor="middle" font-size="12" font-weight="bold" class="text">MP1584</text>
  <text x="530" y="232" text-anchor="middle" font-size="9" class="text-dim">Buck Converter</text>
  <text x="530" y="248" text-anchor="middle" font-size="9" class="text-dim">Set to 5.0V</text>

  <!-- Buck input labels -->
  <text x="456" y="204" font-size="9" class="text">IN-</text>
  <text x="456" y="254" font-size="9" class="text">IN+</text>

  <!-- Buck output labels -->
  <text x="586" y="204" font-size="9" class="text">OUT-</text>
  <text x="586" y="254" font-size="9" class="text">OUT+</text>

  <!-- Buck output wires -->
  <line x1="610" y1="200" x2="660" y2="200" class="wire-gnd"/>
  <line x1="610" y1="250" x2="660" y2="250" class="wire-pwr"/>

  <!-- ==================== 100uF CAPACITOR ==================== -->
  <line x1="660" y1="250" x2="660" y2="230" class="wire-pwr"/>
  <!-- Cap plates -->
  <line x1="650" y1="230" x2="670" y2="230" stroke-width="3" class="wire"/>
  <line x1="650" y1="222" x2="670" y2="222" stroke-width="3" class="wire"/>
  <text x="677" y="228" font-size="8" font-weight="bold" fill="#e74c3c">+</text>
  <line x1="660" y1="222" x2="660" y2="200" class="wire-gnd"/>
  <circle cx="660" cy="200" r="3" class="wire-gnd" fill="currentColor"/>
  <circle cx="660" cy="250" r="3" class="wire-pwr" fill="currentColor"/>

  <text x="685" y="222" font-size="10" font-weight="bold" class="text">C1</text>
  <text x="685" y="236" font-size="9" class="text-dim">100uF</text>

  <!-- 5.0V label -->
  <text x="660" y="268" text-anchor="middle" font-size="10" font-weight="bold" class="text">5.0V</text>

  <!-- ==================== OUTPUT TO WEMOS ==================== -->
  <!-- 5V output wire -->
  <line x1="660" y1="250" x2="660" y2="340" class="wire-pwr"/>
  <rect x="610" y="340" width="130" height="30" rx="4" class="comp"/>
  <text x="675" y="360" text-anchor="middle" font-size="11" font-weight="bold" class="text">-> Wemos 5V</text>

  <!-- GND output wire -->
  <line x1="660" y1="200" x2="660" y2="170" class="wire-gnd"/>
  <line x1="660" y1="170" x2="750" y2="170" class="wire-gnd"/>
  <line x1="750" y1="170" x2="750" y2="395" class="wire-gnd"/>
  <line x1="750" y1="395" x2="740" y2="395" class="wire-gnd"/>
  <rect x="610" y="380" width="130" height="30" rx="4" class="comp"/>
  <text x="675" y="400" text-anchor="middle" font-size="11" font-weight="bold" class="text">-> Wemos GND</text>

  <!-- ==================== SAFETY WARNING ==================== -->
  <rect x="550" y="55" width="220" height="80" rx="4" stroke="#f39c12" stroke-width="2" fill="none"/>
  <rect x="550" y="55" width="220" height="80" rx="4" class="legend-bg" stroke="#f39c12" stroke-width="2"/>
  <text x="660" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#f39c12">!! WARNING !!</text>
  <text x="660" y="96" text-anchor="middle" font-size="10" class="text">Use MATCHED cells only!</text>
  <text x="660" y="112" text-anchor="middle" font-size="9" class="text-dim">Same capacity, same grade</text>
  <text x="660" y="126" text-anchor="middle" font-size="9" class="text-dim">Verify with cell tester first</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="30" y="490" width="380" height="45" rx="4" class="legend-bg"/>
  <text x="42" y="510" font-size="10" font-weight="bold" class="text">Legend:</text>
  <line x1="100" y1="507" x2="125" y2="507" class="wire-pwr" stroke-width="2"/>
  <text x="130" y="511" font-size="9" class="text">V+ (power)</text>
  <line x1="210" y1="507" x2="235" y2="507" class="wire-gnd" stroke-width="2"/>
  <text x="240" y="511" font-size="9" class="text">GND</text>
  <line x1="290" y1="507" x2="315" y2="507" class="wire" stroke-width="2"/>
  <text x="320" y="511" font-size="9" class="text">Mid-point / other</text>
</svg>
