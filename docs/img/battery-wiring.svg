<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 600" font-family="monospace" font-size="12">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a2e; }
        .text { fill: #e0e0e0; }
        .text-dim { fill: #999; }
        .wire { stroke: #ccc; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #ff6b6b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #74b9ff; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #a29bfe; stroke-width: 1.5; fill: none; }
        .comp { fill: #2a3a4e; stroke: #5a7a9e; stroke-width: 1.5; }
        .comp-bms { fill: #2a4a3e; stroke: #4a8a6e; stroke-width: 1.5; }
        .comp-buck { fill: #3a3a2e; stroke: #8a8a5e; stroke-width: 1.5; }
        .comp-cap { fill: #4a3a2e; stroke: #9a7a5e; stroke-width: 1.5; }
        .comp-cell { fill: #3e3a2a; stroke: #8e8a5a; stroke-width: 1.5; }
        .comp-mcu { fill: #1e3a5e; stroke: #4e7aae; stroke-width: 1.5; }
        .legend-bg { fill: #22223a; stroke: #444; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .text { fill: #333; }
        .text-dim { fill: #999; }
        .wire { stroke: #333; stroke-width: 1.5; fill: none; }
        .wire-pwr { stroke: #c0392b; stroke-width: 2; fill: none; }
        .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
        .wire-sig { stroke: #2980b9; stroke-width: 1.5; fill: none; }
        .comp { fill: #ecf0f1; stroke: #7f8c8d; stroke-width: 1.5; }
        .comp-bms { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; }
        .comp-buck { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
        .comp-cap { fill: #fdebd0; stroke: #e67e22; stroke-width: 1.5; }
        .comp-cell { fill: #fef9e7; stroke: #d4ac0d; stroke-width: 1.5; }
        .comp-mcu { fill: #d6eaf8; stroke: #2980b9; stroke-width: 1.5; }
        .legend-bg { fill: #f8f9fa; stroke: #ddd; }
      }
    </style>
  </defs>

  <rect width="850" height="600" class="bg" rx="4"/>

  <!-- Title -->
  <text x="425" y="28" text-anchor="middle" font-size="15" font-weight="bold" class="text">Battery Monitoring — ESP8266 Wiring Diagram</text>

  <!-- ==================== 2S BATTERY PACK (vertical series) ==================== -->
  <text x="90" y="60" text-anchor="middle" font-size="12" font-weight="bold" class="text">2S 18650 Pack</text>

  <!-- Cell 1 (top) -->
  <rect x="30" y="75" width="120" height="70" rx="4" class="comp-cell"/>
  <rect x="150" y="90" width="8" height="40" rx="3" class="comp-cell"/>
  <text x="90" y="100" text-anchor="middle" font-size="11" font-weight="bold" class="text">Cell #1</text>
  <text x="90" y="115" text-anchor="middle" font-size="9" class="text-dim">3.7V nominal</text>
  <!-- Cell 1 terminals: minus at top, plus at bottom -->
  <text x="42" y="93" font-size="12" font-weight="bold" fill="#3498db">-</text>
  <text x="130" y="140" font-size="12" font-weight="bold" fill="#e74c3c">+</text>

  <!-- Series connection wire: Cell1 plus (bottom) to Cell2 minus (top) -->
  <line x1="90" y1="145" x2="90" y2="175" class="wire"/>
  <!-- Mid-point label -->
  <circle cx="90" cy="160" r="4" fill="#f39c12"/>
  <text x="115" y="164" font-size="10" font-weight="bold" class="text">MID</text>
  <text x="155" y="164" font-size="9" class="text-dim">~3.7V</text>

  <!-- Cell 2 (bottom) -->
  <rect x="30" y="175" width="120" height="70" rx="4" class="comp-cell"/>
  <rect x="150" y="190" width="8" height="40" rx="3" class="comp-cell"/>
  <text x="90" y="200" text-anchor="middle" font-size="11" font-weight="bold" class="text">Cell #2</text>
  <text x="90" y="215" text-anchor="middle" font-size="9" class="text-dim">3.7V nominal</text>
  <!-- Cell 2 terminals: minus at top, plus at bottom -->
  <text x="42" y="193" font-size="12" font-weight="bold" fill="#3498db">-</text>
  <text x="130" y="240" font-size="12" font-weight="bold" fill="#e74c3c">+</text>

  <!-- ==================== BMS 2S MODULE ==================== -->
  <rect x="220" y="80" width="130" height="170" rx="4" class="comp-bms"/>
  <text x="285" y="110" text-anchor="middle" font-size="13" font-weight="bold" class="text">BMS 2S</text>
  <text x="285" y="128" text-anchor="middle" font-size="9" class="text-dim">Protection PCB</text>

  <!-- BMS input pad labels (left side) -->
  <text x="228" y="158" font-size="10" font-weight="bold" class="text">B+</text>
  <text x="228" y="178" font-size="10" font-weight="bold" class="text">BM</text>
  <text x="228" y="198" font-size="10" font-weight="bold" class="text">B-</text>

  <!-- BMS output pad labels (right side) -->
  <text x="322" y="158" font-size="10" font-weight="bold" class="text">P+</text>
  <text x="322" y="198" font-size="10" font-weight="bold" class="text">P-</text>

  <!-- Wire: Cell1 minus (top of pack, GND) to B- -->
  <!-- Cell1 minus is at top-left of Cell1 -->
  <line x1="30" y1="88" x2="15" y2="88" class="wire-gnd"/>
  <line x1="15" y1="88" x2="15" y2="220" class="wire-gnd"/>
  <line x1="15" y1="220" x2="200" y2="220" class="wire-gnd"/>
  <line x1="200" y1="220" x2="200" y2="194" class="wire-gnd"/>
  <line x1="200" y1="194" x2="220" y2="194" class="wire-gnd"/>

  <!-- Wire: Mid-point to BM -->
  <line x1="90" y1="160" x2="90" y2="174" class="wire"/>
  <line x1="200" y1="174" x2="220" y2="174" class="wire"/>
  <line x1="90" y1="174" x2="200" y2="174" class="wire"/>

  <!-- Wire: Cell2 plus (bottom of pack, V+) to B+ -->
  <line x1="158" y1="210" x2="170" y2="210" class="wire-pwr"/>
  <line x1="170" y1="210" x2="170" y2="235" class="wire-pwr"/>
  <line x1="170" y1="235" x2="205" y2="235" class="wire-pwr"/>
  <line x1="205" y1="235" x2="205" y2="154" class="wire-pwr"/>
  <line x1="205" y1="154" x2="220" y2="154" class="wire-pwr"/>

  <!-- BMS P+ output wire -->
  <line x1="350" y1="154" x2="390" y2="154" class="wire-pwr"/>
  <text x="370" y="145" text-anchor="middle" font-size="9" class="text-dim">6.0-8.4V</text>

  <!-- BMS P- output wire -->
  <line x1="350" y1="194" x2="390" y2="194" class="wire-gnd"/>

  <!-- ==================== VOLTAGE DIVIDER ==================== -->
  <!-- P+ wire splits: one branch goes right to buck, one goes down to divider -->
  <!-- Horizontal wire from P+ to junction -->
  <line x1="390" y1="154" x2="440" y2="154" class="wire-pwr"/>
  <circle cx="440" cy="154" r="3" class="wire-pwr" fill="currentColor"/>

  <!-- Branch down to R1 -->
  <line x1="440" y1="154" x2="440" y2="270" class="wire-pwr"/>

  <!-- R1 resistor body (150k) -->
  <rect x="425" y="270" width="30" height="60" rx="4" class="comp"/>
  <text x="440" y="297" text-anchor="middle" font-size="9" class="text">R1</text>
  <text x="440" y="310" text-anchor="middle" font-size="8" class="text-dim">150k</text>
  <!-- Color bands -->
  <rect x="425" y="276" width="30" height="3" fill="#8b4513"/>
  <rect x="425" y="282" width="30" height="3" fill="#2ecc71"/>
  <rect x="425" y="288" width="30" height="3" fill="#f1c40f"/>

  <!-- Wire R1 to mid-point -->
  <line x1="440" y1="330" x2="440" y2="355" class="wire"/>

  <!-- Mid-point node (signal tap) -->
  <circle cx="440" cy="355" r="4" fill="#a29bfe"/>
  <text x="465" y="350" font-size="10" font-weight="bold" class="text">MID</text>
  <text x="465" y="365" font-size="9" class="text-dim">2.4-3.36V</text>

  <!-- Wire mid-point to R2 -->
  <line x1="440" y1="355" x2="440" y2="385" class="wire"/>

  <!-- R2 resistor body (100k) -->
  <rect x="425" y="385" width="30" height="60" rx="4" class="comp"/>
  <text x="440" y="412" text-anchor="middle" font-size="9" class="text">R2</text>
  <text x="440" y="425" text-anchor="middle" font-size="8" class="text-dim">100k</text>
  <!-- Color bands -->
  <rect x="425" y="391" width="30" height="3" fill="#8b4513"/>
  <rect x="425" y="397" width="30" height="3" fill="#000"/>
  <rect x="425" y="403" width="30" height="3" fill="#f1c40f"/>

  <!-- R2 to GND -->
  <line x1="440" y1="445" x2="440" y2="475" class="wire-gnd"/>

  <!-- GND rail from P- going down -->
  <line x1="390" y1="194" x2="390" y2="475" class="wire-gnd"/>
  <line x1="390" y1="475" x2="440" y2="475" class="wire-gnd"/>

  <!-- GND symbol under divider -->
  <line x1="415" y1="475" x2="415" y2="495" class="wire-gnd"/>
  <line x1="400" y1="495" x2="430" y2="495" stroke-width="2" class="wire-gnd"/>
  <line x1="404" y1="501" x2="426" y2="501" stroke-width="1.5" class="wire-gnd"/>
  <line x1="408" y1="507" x2="422" y2="507" stroke-width="1" class="wire-gnd"/>
  <text x="415" y="522" text-anchor="middle" font-size="10" class="text-dim">GND</text>

  <!-- ==================== MP1584 BUCK CONVERTER ==================== -->
  <!-- P+ continues right to buck -->
  <line x1="440" y1="154" x2="530" y2="154" class="wire-pwr"/>
  <!-- P- continues right to buck (separate horizontal wire, 15px below P+) -->
  <line x1="390" y1="194" x2="530" y2="194" class="wire-gnd"/>

  <rect x="530" y="130" width="130" height="85" rx="4" class="comp-buck"/>
  <text x="595" y="158" text-anchor="middle" font-size="12" font-weight="bold" class="text">MP1584</text>
  <text x="595" y="175" text-anchor="middle" font-size="9" class="text-dim">Buck Converter</text>
  <text x="595" y="190" text-anchor="middle" font-size="9" class="text-dim">Set to 5.0V</text>

  <!-- Buck input labels -->
  <text x="536" y="152" font-size="9" class="text">IN+</text>
  <text x="536" y="195" font-size="9" class="text">IN-</text>

  <!-- Buck output labels -->
  <text x="635" y="152" font-size="9" class="text">OUT+</text>
  <text x="635" y="195" font-size="9" class="text">OUT-</text>

  <!-- Buck output wires -->
  <line x1="660" y1="148" x2="700" y2="148" class="wire-pwr"/>
  <line x1="660" y1="191" x2="700" y2="191" class="wire-gnd"/>

  <!-- ==================== 100uF CAPACITOR ==================== -->
  <!-- Vertical cap between buck OUT+ and OUT- -->
  <line x1="700" y1="148" x2="700" y2="160" class="wire-pwr"/>
  <!-- Cap plates -->
  <line x1="690" y1="160" x2="710" y2="160" stroke-width="3" class="wire"/>
  <line x1="690" y1="168" x2="710" y2="168" stroke-width="3" class="wire"/>
  <text x="717" y="163" font-size="8" font-weight="bold" fill="#e74c3c">+</text>
  <line x1="700" y1="168" x2="700" y2="191" class="wire-gnd"/>
  <circle cx="700" cy="191" r="3" class="wire-gnd" fill="currentColor"/>
  <text x="718" y="180" font-size="9" font-weight="bold" class="text">C1</text>
  <text x="740" y="180" font-size="8" class="text-dim">100uF</text>

  <!-- Continue output wires to MCU -->
  <line x1="700" y1="148" x2="735" y2="148" class="wire-pwr"/>
  <circle cx="700" cy="148" r="3" class="wire-pwr" fill="currentColor"/>
  <line x1="700" y1="191" x2="735" y2="191" class="wire-gnd"/>

  <!-- 5.0V label -->
  <text x="720" y="140" text-anchor="middle" font-size="10" font-weight="bold" class="text">5.0V</text>

  <!-- ==================== WEMOS D1 MINI ==================== -->
  <rect x="560" y="270" width="250" height="250" rx="4" class="comp-mcu"/>
  <text x="685" y="300" text-anchor="middle" font-size="14" font-weight="bold" class="text">Wemos D1 Mini</text>
  <text x="685" y="318" text-anchor="middle" font-size="10" class="text-dim">ESP8266</text>

  <!-- Left side pins -->
  <rect x="566" y="345" width="50" height="20" rx="4" fill="#f39c12" stroke="none"/>
  <text x="591" y="359" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">A0</text>

  <rect x="566" y="380" width="50" height="20" rx="4" class="comp"/>
  <text x="591" y="394" text-anchor="middle" font-size="9" class="text">D0</text>

  <rect x="566" y="415" width="50" height="20" rx="4" class="comp"/>
  <text x="591" y="429" text-anchor="middle" font-size="9" class="text">D5</text>

  <!-- Right side pins -->
  <rect x="754" y="345" width="50" height="20" rx="4" fill="#c0392b" stroke="none"/>
  <text x="779" y="359" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">5V</text>

  <rect x="754" y="380" width="50" height="20" rx="4" fill="#2c3e50" stroke="none"/>
  <text x="779" y="394" text-anchor="middle" font-size="10" font-weight="bold" fill="#74b9ff">GND</text>

  <rect x="754" y="415" width="50" height="20" rx="4" class="comp"/>
  <text x="779" y="429" text-anchor="middle" font-size="9" class="text">D1</text>

  <!-- USB connector -->
  <rect x="665" y="495" width="40" height="18" rx="3" fill="#555" stroke="#777"/>
  <text x="685" y="508" text-anchor="middle" font-size="8" fill="#ddd">USB</text>

  <!-- ==================== WIRES TO MCU ==================== -->
  <!-- 5V wire: from buck output down-right to MCU 5V pin -->
  <line x1="735" y1="148" x2="830" y2="148" class="wire-pwr"/>
  <line x1="830" y1="148" x2="830" y2="355" class="wire-pwr"/>
  <line x1="830" y1="355" x2="804" y2="355" class="wire-pwr"/>

  <!-- GND wire: from buck output down-right to MCU GND pin -->
  <line x1="735" y1="191" x2="840" y2="191" class="wire-gnd"/>
  <line x1="840" y1="191" x2="840" y2="390" class="wire-gnd"/>
  <line x1="840" y1="390" x2="804" y2="390" class="wire-gnd"/>

  <!-- Signal wire: divider MID to MCU A0 -->
  <line x1="440" y1="355" x2="510" y2="355" class="wire-sig"/>
  <line x1="510" y1="355" x2="566" y2="355" class="wire-sig"/>

  <!-- ==================== LEGEND ==================== -->
  <rect x="30" y="545" width="450" height="42" rx="4" class="legend-bg"/>
  <text x="42" y="563" font-size="10" font-weight="bold" class="text">Legend:</text>
  <line x1="100" y1="560" x2="125" y2="560" class="wire-pwr" stroke-width="2"/>
  <text x="130" y="564" font-size="9" class="text">V+ (power)</text>
  <line x1="210" y1="560" x2="235" y2="560" class="wire-gnd" stroke-width="2"/>
  <text x="240" y="564" font-size="9" class="text">GND</text>
  <line x1="290" y1="560" x2="315" y2="560" class="wire-sig" stroke-width="2"/>
  <text x="320" y="564" font-size="9" class="text">Signal (A0)</text>
  <line x1="400" y1="560" x2="425" y2="560" class="wire" stroke-width="2"/>
  <text x="430" y="564" font-size="9" class="text">Other</text>

  <!-- Formula box -->
  <rect x="500" y="545" width="320" height="42" rx="4" class="legend-bg"/>
  <text x="660" y="566" text-anchor="middle" font-size="10" class="text">V_A0 = V_bat x R2/(R1+R2) = V_bat x 0.4</text>
  <text x="660" y="580" text-anchor="middle" font-size="9" class="text-dim">Range: 2.40V (empty) to 3.36V (full)</text>
</svg>
