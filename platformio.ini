; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; --- Common settings ---
[common]
build_flags =
    -Wall
    -Wextra
monitor_speed = 115200

[env]
test_framework = unity

; --- Common ESP8266 settings ---
[common_esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DMQTT_MAX_PACKET_SIZE=512
lib_deps =
    knolleary/PubSubClient@^2.8

; ============================================================
; Device environments
; ============================================================
; Each environment defines:
;   - DEVICE_ID: unique identifier on the network
;   - MQTT_DEVICE_TYPE: device category (e.g. "thermo")
;   - HAS_xxx flags: enabled hardware modules
;
; Available modules:
;   HAS_BME280     - BME/BMP280 temperature/humidity/pressure sensor
;   HAS_DISPLAY    - 7-segment display + push button
;   HAS_BATTERY    - Battery voltage monitoring via ADC
;   HAS_DEEP_SLEEP - Deep sleep between readings (requires HAS_BATTERY)
;   HAS_SERIAL_DEBUG - Verbose serial debug output (disable for production)

[env:thermo_empty]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -DDEVICE_ID='"thermo_empty"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHAS_SERIAL_DEBUG
    -DHAS_BME280

[env:thermo_display]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -DDEVICE_ID='"thermo_display"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHAS_BME280
    -DHAS_DISPLAY
    -DHAS_SERIAL_DEBUG

[env:thermo_1]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -DDEVICE_ID='"thermo_1"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHAS_BME280
    -DHAS_BATTERY
    -DHAS_DEEP_SLEEP

; --- Common SAMD settings (Arduino MKR) ---
[common_samd]
platform = atmelsam
framework = arduino
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -std=gnu++17
    -DMQTT_MAX_PACKET_SIZE=512
lib_deps =
    arduino-libraries/WiFiNINA@^1.8
    knolleary/PubSubClient@^2.8
build_unflags = -std=gnu++11

[env:thermo_mkr]
extends = common_samd
board = mkrwifi1010
build_flags =
    ${common_samd.build_flags}
    -DDEVICE_ID='"thermo_mkr"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHAS_BME280
    -DHAS_BATTERY
    -DHAS_SERIAL_DEBUG

; --- Cell tester (MKR WiFi 1010, serial only, no MQTT) ---
[env:cell_tester]
platform = atmelsam
board = mkrwifi1010
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
    -std=gnu++17
    -DCELL_TESTER
build_unflags = -std=gnu++11
src_filter = +<cell_tester.cpp>
lib_deps =
    Wire

; --- Native target for local debugging and testing ---
[env:native]
platform = native
build_flags =
    -Wall
    -Wextra
    -std=c++17
    -DNATIVE
    -DDEVICE_ID='"test"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -Iinclude
test_framework = unity
