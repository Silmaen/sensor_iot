; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; --- Common settings ---
[common]
build_flags =
    -Wall
    -Wextra
monitor_speed = 115200

[env]
test_framework = unity

; --- Common ESP8266 settings ---
[common_esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
    knolleary/PubSubClient@^2.8

; ============================================================
; Device environments
; ============================================================
; Each environment defines:
;   - DEVICE_ID: unique identifier on the network
;   - MQTT_DEVICE_TYPE: device category (e.g. "thermo")
;   - HAS_xxx flags: enabled hardware modules
;
; Available modules:
;   HAS_BME280     - BME/BMP280 temperature/humidity/pressure sensor
;   HAS_DISPLAY    - 7-segment display + push button
;   HAS_BATTERY    - Battery voltage monitoring via ADC
;   HAS_DEEP_SLEEP - Deep sleep between readings (requires HAS_BATTERY)

[env:thermo1_display]
extends = common_esp8266
build_flags =
    ${common.build_flags}
    -DDEVICE_ID='"thermo_display"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHAS_BME280
    -DHAS_DISPLAY

[env:thermo1_battery]
extends = common_esp8266
build_flags =
    ${common.build_flags}
    -DDEVICE_ID='"thermo_1"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHAS_BME280
    -DHAS_BATTERY
    -DHAS_DEEP_SLEEP

; --- Native target for local debugging and testing ---
[env:native]
platform = native
build_flags =
    -Wall
    -Wextra
    -std=c++17
    -DNATIVE
    -DDEVICE_ID='"test"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -Iinclude
test_framework = unity
