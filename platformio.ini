; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; --- Common settings ---
[common]
; FIRMWARE_VERSION is global (semver): bump it on every firmware release so the
; update server can compare it against the latest image for a given HW_CODE.
firmware_version = 1.0.0
build_flags =
    -Wall
    -Wextra
    -DFIRMWARE_VERSION='"${common.firmware_version}"'
monitor_speed = 115200

[env]
test_framework = unity

; --- Common ESP8266 settings ---
[common_esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = ${common.monitor_speed}
; LittleFS holds the runtime config store (device_id + calibration); it lives in
; its own flash region and survives an OTA (app-partition-only) and power loss.
board_build.filesystem = littlefs
extra_scripts = post:tools/gen_manifest.py
build_flags =
    ${common.build_flags}
    -DMQTT_MAX_PACKET_SIZE=512
lib_deps =
    knolleary/PubSubClient@^2.8

; --- Common ESP32-C3 settings ---
[common_esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = ${common.monitor_speed}
; Dual-app-slot partition table (ota_0/ota_1 + nvs) required for OTA; NVS holds
; the runtime config store.
board_build.partitions = min_spiffs.csv
extra_scripts = post:tools/gen_manifest.py
build_flags =
    ${common.build_flags}
    -DMQTT_MAX_PACKET_SIZE=512
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    knolleary/PubSubClient@^2.8

; --- Common SAMD settings (Arduino MKR) ---
[common_samd]
platform = atmelsam
framework = arduino
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -std=gnu++17
    -DMQTT_MAX_PACKET_SIZE=512
lib_deps =
    arduino-libraries/WiFiNINA@^1.8
    knolleary/PubSubClient@^2.8
    arduino-libraries/RTCZero@^1.6
    cmaglie/FlashStorage@^1.0.0
build_unflags = -std=gnu++11
extra_scripts = post:tools/gen_manifest.py

; ============================================================
; Device environments
; ============================================================
; Each environment defines:
;   - DEVICE_ID: unique identifier on the network (per unit)
;   - MQTT_DEVICE_TYPE: device category (e.g. "thermo")
;   - HW_CODE: hardware code — MUST be identical for units with the same
;     hardware/module configuration (only DEVICE_ID / per-unit calibration may
;     differ). Used by the update server to find the firmware image for a board.
;   - HAS_xxx flags: enabled hardware modules
;
; Available modules:
;   HAS_BME280       - BME/BMP280 temperature/humidity/pressure sensor
;   HAS_SHT30        - SHT30 temperature/humidity sensor (Wemos shield)
;   HAS_MKR_ENV      - MKR ENV Shield: HTS221 (temp/hum) + LPS22HB (pressure)
;   HAS_BATTERY      - Battery voltage monitoring via ADC
;   HAS_LIGHT        - Analog light sensor (Seeedstudio photoresistor)
;   HAS_BH1750       - BH1750 digital I2C lux sensor (calibrated, 1-65535 lux)
;   HAS_CALIBRATION  - Per-device sensor offsets (CALIBRATION_TEMP/HUMI/PRESS_OFFSET)
;   HAS_RELAY        - Dual relay board control (toggle + timed contact)
;   HAS_DISPLAY      - 7-segment display + push button
;   HAS_DEEP_SLEEP   - Deep sleep between readings (requires HAS_BATTERY)
;   HAS_SERIAL_DEBUG - Verbose serial debug output (disable for production)
;
; Note: HAS_BME280, HAS_SHT30, and HAS_MKR_ENV are mutually exclusive

; Stage B: device_id is provisioned at runtime (serial `provision <id>`), NOT a
; build flag — so one image serves every unit of a given (HW_CODE, HW_REV).
; DEVICE_ID is kept ONLY on dev builds (HAS_SERIAL_DEBUG) as a store seed (D12);
; production envs omit it and must be provisioned over serial once.
; Calibration (offsets, battery divider ratio) is runtime too (config store +
; server mirror).

; --- Dev build: BME280, serial debug, device_id seeded ---
[env:sensor_8266_empty]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -DDEVICE_ID='"thermo_empty"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHW_CODE='"E8BMEDEV"'
    -DHW_REV=1
    -DHAS_SERIAL_DEBUG
    -DHAS_BME280
    -DHAS_OTA

; --- BME280 + battery (fleet: thermo_1, thermo_2 — provisioned at runtime) ---
[env:sensor_8266_bmp80]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHW_CODE='"E8BMEBAT"'
    -DHW_REV=1
    -DHAS_BME280
    -DHAS_BATTERY
    -DHAS_DEEP_SLEEP
    -DHAS_CALIBRATION
    -DHAS_OTA

[env:sensor_8266_sht30]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHW_CODE='"E8SHTBAT"'
    -DHW_REV=1
    -DHAS_SHT30
    -DHAS_BATTERY
    -DHAS_DEEP_SLEEP
    -DHAS_CALIBRATION
    -DHAS_OTA

; --- Dev build: SHT30 + display, serial debug, device_id seeded ---
[env:sensor_8266_display_sht30]
extends = common_esp8266
build_flags =
    ${common_esp8266.build_flags}
    -DDEVICE_ID='"thermo_display_sht30"'
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHW_CODE='"E8SHTDSP"'
    -DHW_REV=1
    -DHAS_SHT30
    -DHAS_DISPLAY
    -DHAS_SERIAL_DEBUG
    -DHAS_CALIBRATION
    -DHAS_OTA


[env:sensor_mkr_env]
extends = common_samd
board = mkrwifi1010
build_flags =
    ${common_samd.build_flags}
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHW_CODE='"MKENVBAT"'
    -DHW_REV=1
    -DHAS_MKR_ENV
    -DHAS_BATTERY
    -DHAS_CALIBRATION
#-DHAS_SERIAL_DEBUG

; --- MKR debug: same hardware, verbose serial (waits for the monitor at boot,
;     10 s interval). Flash with `-t upload` (keeps the provisioned device_id). ---
[env:sensor_mkr_debug]
extends = common_samd
board = mkrwifi1010
build_flags =
    ${common_samd.build_flags}
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHW_CODE='"MKENVBAT"'
    -DHW_REV=1
    -DHAS_MKR_ENV
    -DHAS_BATTERY
    -DHAS_CALIBRATION
    -DHAS_SERIAL_DEBUG

; --- ESP32-C3 sensor nodes ---
[env:sensor_c3_bme280_bh1750]
extends = common_esp32c3
build_flags =
    ${common_esp32c3.build_flags}
    -DMQTT_DEVICE_TYPE='"thermo"'
    -DHW_CODE='"C3BMELUX"'
    -DHW_REV=1
    -DHAS_BME280
    -DHAS_BH1750
    -DHAS_BATTERY
    -DHAS_DEEP_SLEEP
    -DHAS_CALIBRATION
    -DHAS_OTA

; --- Cell tester (MKR WiFi 1010, serial only, no MQTT) ---
[env:cell_tester_mkr]
platform = atmelsam
board = mkrwifi1010
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
    -std=gnu++17
    -DCELL_TESTER
build_unflags = -std=gnu++11
build_src_filter = +<cell_tester.cpp>
lib_deps =
    Wire

; --- Native target for local debugging and testing ---
[env:native]
platform = native
build_flags =
    -Wall
    -Wextra
    -std=c++17
    -DNATIVE
    -DDEVICE_ID='"test"'
    -DMQTT_DEVICE_TYPE='"thermo"'
test_framework = unity
